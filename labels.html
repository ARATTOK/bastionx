<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Etiquetas</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/supabase.js"></script>
  <script defer src="js/toast.js"></script>
  <script defer src="js/labels.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .labels-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .labels-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid #333;
    }
    .labels-header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .labels-header .labels-actions {
      display: flex;
      gap: 0.5rem;
    }
    .labels-header .labels-actions button,
    .labels-header .labels-actions a {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      font-size: 0.72rem;
      cursor: pointer;
      color: #ccc;
      background: #1a1a1a;
      text-decoration: none;
    }
    .labels-header .labels-actions button:hover,
    .labels-header .labels-actions a:hover {
      background: rgba(255,255,255,0.06);
    }

    .labels-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }

    .label-card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.7rem 0.8rem;
      min-height: 80px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .label-card .lc-content {
      flex: 1;
      min-width: 0;
    }
    .label-card .lc-hostname {
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }
    .label-card .lc-meta {
      font-size: 0.6rem;
      color: #888;
      margin-top: 0.2rem;
      line-height: 1.3;
    }
    .label-card .lc-ipmi {
      font-size: 0.6rem;
      color: #6c5ce7;
      margin-top: 0.15rem;
      font-family: monospace;
    }
    .label-card .lc-qr {
      width: 54px;
      height: 54px;
      border-radius: 4px;
      flex-shrink: 0;
      background: #fff;
      padding: 2px;
    }

    @media print {
      @page {
        margin: 0.5in;
      }
      body {
        background: #fff !important;
      }
      .labels-page {
        padding: 0 !important;
      }
      .labels-header {
        display: none !important;
      }
      .labels-grid {
        gap: 0.15in;
      }
      .label-card {
        background: #fff !important;
        border: 1px solid #ccc !important;
        border-radius: 3px !important;
        padding: 0.1in !important;
        min-height: 0.7in !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        page-break-inside: avoid !important;
      }
      .label-card .lc-hostname {
        color: #000 !important;
        font-size: 10pt !important;
      }
      .label-card .lc-meta {
        color: #666 !important;
        font-size: 7pt !important;
      }
      .label-card .lc-ipmi {
        color: #333 !important;
        font-size: 7pt !important;
      }
    }

    @media (max-width: 600px) {
      .labels-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
<div x-data="labelsApp()" x-init="init()">
  <div class="loading-state" x-show="loading" style="padding:3rem;text-align:center;">
    <iconify-icon icon="lucide:loader" style="width:18px;height:18px;color:#6c5ce7;animation:spin 1s linear infinite;"></iconify-icon>
    Cargando etiquetas...
  </div>

  <div x-show="!loading" class="labels-page">
    <!-- HEADER (Unified Top Navigation Bar) -->
    <div class="topbar">
      <h1>
        <iconify-icon icon="lucide:printer" class="logo-icon"></iconify-icon>
        BASTIONX LAB
        <small>etiquetas de rack qr</small>
      </h1>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <button class="at-btn" @click="print()" title="Imprimir etiquetas de rack">
          <iconify-icon icon="lucide:printer" style="pointer-events:none;"></iconify-icon>
          Imprimir
        </button>
        <a class="at-btn" href="dashboard.html" @click.prevent="window.location.href='dashboard.html'" title="Volver al Dashboard">
          <iconify-icon icon="lucide:arrow-left" style="pointer-events:none;"></iconify-icon>
          Volver al Dashboard
        </a>
      </div>
    </div>

    <!-- LABELS -->
    <div class="labels-grid" x-show="servers.length > 0">
      <template x-for="s in servers" :key="s.id">
        <div class="label-card">
          <div class="lc-content">
            <div class="lc-hostname" x-text="s.hostname"></div>
            <div class="lc-meta">
              <span x-text="s.modelo || s.sn ? (s.modelo || '') + (s.modelo && s.sn ? ' · ' : '') + (s.sn || '') : ''"></span>
              <span x-show="s.ubicacion"> <br x-show="s.modelo || s.sn"><span x-text="s.ubicacion"></span></span>
            </div>
            <div class="lc-ipmi" x-show="credField(s, 'ipmi') && canEdit" x-text="'IPMI: ' + credField(s, 'ipmi')"></div>
          </div>
          <img class="lc-qr" :src="serverQrUrl(s)" title="Escanear para ver en móvil" alt="QR Code">
        </div>
      </template>
    </div>
    <div class="empty-state" x-show="servers.length === 0 && !loading">
      <iconify-icon icon="lucide:printer" style="width:28px;height:28px;color:#333;"></iconify-icon>
      <h3>Sin servidores para etiquetar</h3>
      <p>Agrega servidores primero para generar etiquetas</p>
    </div>
  </div>
</div>

<!-- Toast container -->
<div x-data x-show="$store.toast.items.length" class="toast-container">
  <template x-for="t in $store.toast.items" :key="t.id">
    <div class="toast" :class="t.type">
      <iconify-icon icon="lucide:check-circle" x-show="t.type==='success'" style="width:16px;height:16px;color:#2ecc71;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:alert-circle" x-show="t.type==='error'" style="width:16px;height:16px;color:#e74c3c;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:info" x-show="t.type==='info'" style="width:16px;height:16px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
      <span x-text="t.message"></span>
    </div>
  </template>
</div>
</body>
</html>
