<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Inventory Control</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="/manifest.json">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.338.0/font/Lucide.css">

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div x-data="app()" x-init="init()">
  <div class="loading-state" x-show="loading && !user">
    <svg style="width:18px;height:18px;color:#6c5ce7;animation:spin 1s linear infinite;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 2a10 10 0 0 1 10 10"/>
    </svg>
    Verificando sesión...
  </div>

  <template x-if="user">
    <div class="container">
      <!-- TOP BAR -->
      <div class="topbar">
        <h1>
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
            <line x1="6" y1="6" x2="6.01" y2="6"/>
            <line x1="6" y1="18" x2="6.01" y2="18"/>
          </svg>
          BASTIONX LAB
          <small>inventory control</small>
        </h1>
        <div class="user-badge" @click="logout">
          <svg class="u-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span x-text="user?.email"></span>
          <span class="role-badge" :class="isSuperAdmin ? 'super' : ''" x-text="isSuperAdmin ? 'super admin' : userRole"></span>
          <svg style="width:12px;height:12px;color:#333;margin-left:4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </div>
      </div>

      <!-- STATS ROW -->
      <div class="stats-row">
        <div class="stat-pill online">
          <span class="s-dot"></span>
          <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Activos <span class="s-count" x-text="countByStatus('Activo')"></span>
        </div>
        <div class="stat-pill offline">
          <span class="s-dot"></span>
          <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          Inactivos <span class="s-count" x-text="countByStatus('Inactivo')"></span>
        </div>
        <div class="stat-pill pending">
          <span class="s-dot"></span>
          <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          Pendientes <span class="s-count" x-text="countByStatus('Pendiente')"></span>
        </div>
        <div class="stat-pill free">
          <span class="s-dot"></span>
          <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
          </svg>
          Libres <span class="s-count" x-text="countByStatus('Libre')"></span>
        </div>
        <div class="stat-pill" style="color:#666;border-color:transparent;background:transparent;">
          <svg style="width:13px;height:13px;color:#444;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
          Total <span class="s-count" style="color:#aaa;" x-text="servers.length"></span>
        </div>
        <div class="stat-pill" style="color:#666;border-color:transparent;background:transparent;">
          <svg style="width:13px;height:13px;color:#444;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
            <line x1="6" y1="6" x2="6.01" y2="6"/>
            <line x1="6" y1="18" x2="6.01" y2="18"/>
          </svg>
          RAM: <span x-text="totalRam + ' GB'"></span>
        </div>
      </div>

      <!-- ADMIN CARD -->
      <div class="admin-card" x-show="isSuperAdmin && !loading">
        <div class="admin-card-header">
          <svg style="width:20px;height:20px;color:#6c5ce7;flex-shrink:0;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <div>
            <h2>Panel de Administraci&oacute;n</h2>
            <p>Gestiona servidores, usuarios y tags del inventario</p>
          </div>
        </div>
        <div class="admin-card-grid">
          <button class="admin-card-btn" @click="showAddServer = true">
            <div class="acb-icon" style="background:#6c5ce718;color:#6c5ce7;">
              <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </div>
            <div class="acb-text">
              <strong>Agregar servidor</strong>
              <span>Registrar un nuevo equipo en el inventario</span>
            </div>
          </button>
          <button class="admin-card-btn" @click="showUserManager = true; fetchUsers()">
            <div class="acb-icon" style="background:#3498db18;color:#3498db;">
              <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <div class="acb-text">
              <strong>Gestionar usuarios</strong>
              <span>Administrar roles y accesos del sistema</span>
            </div>
          </button>
          <a class="admin-card-btn" href="tags.html">
            <div class="acb-icon" style="background:#2ecc7118;color:#2ecc71;">
              <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>
              </svg>
            </div>
            <div class="acb-text">
              <strong>Gestionar tags</strong>
              <span>Crear y editar etiquetas con colores</span>
            </div>
          </a>
          <button class="admin-card-btn" @click="refreshServers()">
            <div class="acb-icon" style="background:#f39c1218;color:#f39c12;">
              <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
            </div>
            <div class="acb-text">
              <strong>Recargar datos</strong>
              <span>Sincronizar cambios desde la base de datos</span>
            </div>
          </button>
        </div>
      </div>

      <!-- INVENTORY LOADING -->
      <div class="loading-state" x-show="loading">
        <svg style="width:18px;height:18px;color:#6c5ce7;animation:spin 1s linear infinite;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a10 10 0 0 1 10 10"/>
        </svg>
        Cargando inventario...
      </div>

      <!-- KANBAN BOARD -->
      <div class="kanban-board" x-show="!loading">

        <!-- COL: ACTIVO -->
        <div class="kanban-col col-online">
          <div class="col-header">
            <svg class="col-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            Activo
            <span class="col-count" x-text="serversByStatus('Activo').length"></span>
          </div>
          <div class="col-cards">
          <template x-for="s in serversByStatus('Activo')" :key="s.id">
            <div class="kanban-card" :class="'severity-' + (serverCardSeverity(s.id) || 'none')" @click="gotoServer(s.id)">
              <div class="card-section card-section--identity">
              <div class="card-top">
                <svg class="server-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                  <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                  <line x1="6" y1="6" x2="6.01" y2="6"/>
                  <line x1="6" y1="18" x2="6.01" y2="18"/>
                </svg>
                <h4 x-text="s.hostname"></h4>
                <span class="card-model" x-show="s.modelo">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/></svg>
                  <span x-text="s.modelo"></span>
                </span>
              </div>
              <div class="card-meta">
                <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                </svg>
                <span x-text="s.ubicacion"></span>
                <span style="color:#333">&middot;</span>
                <span class="status-dot online"></span>
                <span style="color:var(--c-online)">Activo</span>
                <span class="card-sn" x-show="s.sn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10"/><path d="M6 12a6 6 0 0 1 12 0"/><path d="M8 12a4 4 0 0 1 8 0"/><circle cx="12" cy="12" r="2"/></svg>
                  <span x-text="s.sn"></span>
                </span>
              </div>
              </div>
              <div class="card-section card-section--info">
              <div class="card-tags">
                <span class="tag" :class="cpuTagClass(s)" x-show="s.procesador && s.procesador !== ''">
                  <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                    <rect x="9" y="9" width="6" height="6"/>
                  </svg>
                  <span x-text="shortCpu(s.procesador)"></span>
                </span>
                <span class="tag ram-tag">
                  <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
                    <line x1="9" y1="2" x2="9" y2="6"/>
                    <line x1="15" y1="2" x2="15" y2="6"/>
                  </svg>
                  <span x-text="s.ram_gb + ' GB'"></span>
                </span>
                <span class="tag drive" x-show="diskCount(s) > 0">
                  <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <ellipse cx="12" cy="5" rx="9" ry="3"/>
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                  </svg>
                    <span x-text="diskCount(s) + ' drives'"></span>
                </span>
                <span class="card-svc-count" x-show="s.servicios && s.servicios.length > 0">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                  <span x-text="s.servicios.length + ' svc'"></span>
                </span>
              </div>
              <div class="card-tags-row" x-show="serverTagsMap[s.id] && serverTagsMap[s.id].length > 0">
                <template x-for="(t, ti) in serverTagsMap[s.id].slice(0, 3)" :key="ti">
                  <span class="card-tag-pill" :style="'background:' + t.color + '18;color:' + t.color + ';border-color:' + t.color + '30;'">
                  <span class="card-tag-dot" :style="'background:' + t.color + ';box-shadow:0 0 4px ' + t.color + '80;'"></span>
                  <span x-text="t.name"></span>
                </span>
                </template>
                <span class="card-tag-extra" x-show="serverTagsMap[s.id] && serverTagsMap[s.id].length > 3" x-text="'+' + (serverTagsMap[s.id].length - 3)"></span>
              </div>
              <div class="ram-bar" x-show="s.ram_gb > 0">
                <div class="bar-fill" :style="'width:' + ramPercent(s) + '%;background:' + ramColor(s) + ';'"></div>
              </div>
              </div>
              <div class="card-section card-section--footer">
              <div class="card-actions" x-show="credsMap[s.id] && (credsMap[s.id].ipmi || credsMap[s.id].ip_servicio)">
                <a :href="'https://' + credsMap[s.id].ipmi" target="_blank" @click.stop class="card-action-btn ipmi-btn" x-show="credsMap[s.id] && credsMap[s.id].ipmi">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
                  <span>IPMI</span>
                </a>
                <a :href="'https://' + credsMap[s.id].ip_servicio" target="_blank" @click.stop class="card-action-btn svc-btn" x-show="credsMap[s.id] && credsMap[s.id].ip_servicio">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                  <span>Servicio</span>
                </a>
              </div>
              <div class="card-task-badge" x-show="pendingTasksMap[s.id] && pendingTasksMap[s.id].length > 0">
                <svg x-show="serverCardSeverity(s.id) === 'critical'" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <svg x-show="serverCardSeverity(s.id) === 'config'" viewBox="0 0 24 24" fill="none" stroke="#f39c12" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <svg x-show="serverCardSeverity(s.id) === 'other'" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                <span x-text="pendingTasksMap[s.id].length + (pendingTasksMap[s.id].length === 1 ? ' tarea' : ' tareas')"></span>
              </div>
              </div>
            </div>
          </template>
          </div>
          <template x-if="serversByStatus('Activo').length === 0">
            <div class="empty-col">
              <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                <line x1="6" y1="6" x2="6.01" y2="6"/>
              </svg>
              Sin servidores activos
            </div>
          </template>
        </div>

        <!-- COL: INACTIVO -->
        <div class="kanban-col col-offline">
          <div class="col-header">
            <svg class="col-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            Inactivo
            <span class="col-count" x-text="serversByStatus('Inactivo').length"></span>
          </div>
          <div class="col-cards">
          <template x-for="s in serversByStatus('Inactivo')" :key="s.id">
            <div class="kanban-card" :class="'severity-' + (serverCardSeverity(s.id) || 'none')" @click="gotoServer(s.id)">
              <div class="card-section card-section--identity">
              <div class="card-top">
                <svg class="server-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                  <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                  <line x1="6" y1="6" x2="6.01" y2="6"/>
                  <line x1="6" y1="18" x2="6.01" y2="18"/>
                </svg>
                <h4 x-text="s.hostname"></h4>
                <span class="card-model" x-show="s.modelo">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/></svg>
                  <span x-text="s.modelo"></span>
                </span>
              </div>
              <div class="card-meta">
                <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                </svg>
                <span x-text="s.ubicacion"></span>
                <span style="color:#333">&middot;</span>
                <span class="status-dot offline"></span>
                <span style="color:var(--c-offline)">Inactivo</span>
                <span class="card-sn" x-show="s.sn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10"/><path d="M6 12a6 6 0 0 1 12 0"/><path d="M8 12a4 4 0 0 1 8 0"/><circle cx="12" cy="12" r="2"/></svg>
                  <span x-text="s.sn"></span>
                </span>
              </div>
              </div>
              <div class="card-section card-section--info">
              <div class="card-tags">
                <span class="tag" :class="cpuTagClass(s)" x-show="s.procesador && s.procesador !== ''">
                  <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                    <rect x="9" y="9" width="6" height="6"/>
                  </svg>
                  <span x-text="shortCpu(s.procesador)"></span>
                </span>
                <span class="tag ram-tag">
                  <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
                    <line x1="9" y1="2" x2="9" y2="6"/>
                    <line x1="15" y1="2" x2="15" y2="6"/>
                  </svg>
                  <span x-text="s.ram_gb + ' GB'"></span>
                </span>

                <svg x-show="serverCardSeverity(s.id) === 'config'" viewBox="0 0 24 24" fill="none" stroke="#f39c12" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <svg x-show="serverCardSeverity(s.id) === 'other'" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                <span x-text="pendingTasksMap[s.id].length + (pendingTasksMap[s.id].length === 1 ? ' tarea' : ' tareas')"></span>
              </div>
              </div>
            </div>
          </template>
          </div>
          <template x-if="serversByStatus('Libre').length === 0">
            <div class="empty-col">
              <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
              </svg>
              Sin espacios libres
            </div>
          </template>
        </div>
      </div>

    </div>
  </template>

  <!-- MODAL: AGREGAR SERVIDOR -->
  <div class="modal-overlay" x-show="showAddServer" @click.self="showAddServer = false">
    <div class="modal">
      <h3>Agregar servidor</h3>
      <form @submit.prevent="addServer()">
        <div class="form-group">
          <label>Hostname *</label>
          <input type="text" x-model="newServer.hostname" required>
        </div>
        <div class="form-group">
          <label>Modelo</label>
          <input type="text" x-model="newServer.modelo">
        </div>
        <div class="form-group">
          <label>Serial Number (SN)</label>
          <input type="text" x-model="newServer.sn">
        </div>
        <div class="form-group">
          <label>Ubicaci&oacute;n (U)</label>
          <input type="text" x-model="newServer.ubicacion" placeholder="Ej: U34">
        </div>
        <div class="form-group">
          <label>Procesador</label>
          <input type="text" x-model="newServer.procesador">
        </div>
        <div class="form-group">
          <label>RAM (GB)</label>
          <input type="number" x-model="newServer.ram_gb">
        </div>
        <div class="form-group">
          <label>Estado</label>
          <select x-model="newServer.estado">
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
            <option value="Pendiente">Pendiente</option>
            <option value="Libre">Libre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Discos (JSON)</label>
          <textarea x-model="newServer.discos_str" placeholder='[{&quot;bay&quot;:&quot;Drive 0&quot;,&quot;tipo&quot;:&quot;1TB SATA&quot;}]'></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" @click="showAddServer = false">Cancelar</button>
          <button type="submit" class="btn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: GESTIÓN DE USUARIOS -->
  <div class="modal-overlay" x-show="showUserManager" @click.self="showUserManager = false">
    <div class="modal" style="max-width:560px;">
      <h3>Gestionar usuarios</h3>
      <div style="font-size:0.7rem;color:#555;margin-bottom:1rem;line-height:1.6;">
        Para crear un nuevo usuario, usa el panel de Supabase Auth.
        Desde aqu&iacute; puedes cambiar el rol de cada usuario.
      </div>
      <div class="user-table" x-show="managedUsers.length > 0">
        <div class="user-row user-header">
          <span class="u-col u-email">Email</span>
          <span class="u-col u-role">Rol</span>
          <span class="u-col u-actions">Acciones</span>
        </div>
        <template x-for="u in managedUsers" :key="u.id">
          <div class="user-row">
            <span class="u-col u-email" x-text="u.email || u.id.slice(0,8) + '...'"></span>
            <span class="u-col u-role">
              <span :class="'role-tag ' + (u.role === 'admin' ? 'admin' : 'readonly')" x-text="u.role === 'admin' ? 'admin' : 'readonly'"></span>
            </span>
            <span class="u-col u-actions">
              <template x-if="u.email === 'admin@bastionx.com'">
                <span style="color:#555;font-size:0.6rem;">Protegido</span>
              </template>
              <template x-if="u.email && u.email !== 'admin@bastionx.com'">
                <button class="btn role-toggle" @click="updateUserRole(u.id, u.role === 'admin' ? 'readonly' : 'admin')" x-text="u.role === 'admin' ? 'Revocar admin' : 'Hacer admin'"></button>
              </template>
              <template x-if="!u.email">
                <span style="color:#333;font-size:0.55rem;">Sin email</span>
              </template>
            </span>
          </div>
        </template>
      </div>
      <div x-show="managedUsers.length === 0" style="color:#555;font-size:0.75rem;padding:1rem 0;text-align:center;">
        No hay usuarios registrados.
      </div>
      <div style="margin-top:1rem;display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
        <a class="btn" href="https://supabase.com/dashboard/project/unaadjavtrsogkzcbmev/auth/users" target="_blank" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.7rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.7rem;background:#12121a;color:#888;text-decoration:none;">
          <svg style="width:11px;height:11px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Crear usuario (Dashboard)
        </a>
        <button class="btn" @click="showUserManager = false; managedUsers = []" style="margin-left:auto;">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
</body>
</html>
