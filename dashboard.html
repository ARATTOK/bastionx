<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Inventory Control</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body>

<div x-data="app()" x-init="init()">
  <div class="loading-state" x-show="loading && !user">
    <iconify-icon icon="lucide:loader" style="width:18px;height:18px;color:#6c5ce7;animation:spin 1s linear infinite;"></iconify-icon>
    Verificando sesión...
  </div>

  <div class="container" x-show="user" x-cloak>
      <!-- TOP BAR -->
      <div class="topbar">
        <h1>
          <iconify-icon icon="lucide:server" class="logo-icon"></iconify-icon>
          BASTIONX LAB
          <small>inventory control</small>
        </h1>

        <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
          <!-- EXPANDABLE SEARCH BAR (TOP BAR) -->
          <div class="search-expandable" x-show="!loading">
            <iconify-icon icon="lucide:search" class="sb-icon"></iconify-icon>
            <input type="text" class="sb-input" x-model="searchQuery" placeholder="Buscar servidor, IP, servicio..." @input.debounce="filterServers()">
            <button class="sb-clear" x-show="searchQuery" @click="searchQuery='';filterServers()" title="Limpiar búsqueda">
              <iconify-icon icon="lucide:x" style="width:12px;height:12px;"></iconify-icon>
            </button>
          </div>

          <!-- SUPERADMIN CONTROL PANEL BUTTON -->
          <a class="at-btn" href="admin.html" x-show="isSuperAdmin && !loading" @click.prevent="window.location.href='admin.html'" style="background:rgba(108,92,231,0.18);color:#8e7ff3;border:1px solid rgba(108,92,231,0.4);padding:0.35rem 0.75rem;border-radius:8px;font-weight:600;display:inline-flex;align-items:center;gap:0.35rem;text-decoration:none;">
            <iconify-icon icon="lucide:shield-check" style="width:15px;height:15px;color:#6c5ce7;pointer-events:none;"></iconify-icon>
            Panel de Control
          </a>

          <!-- USER BADGE -->
          <div class="user-badge" @click="logout" title="Cerrar sesión">
            <iconify-icon icon="lucide:user" class="u-icon"></iconify-icon>
            <span x-text="user?.email"></span>
            <span class="role-badge" :class="isSuperAdmin ? 'super' : ''" x-text="isSuperAdmin ? 'super admin' : userRole"></span>
            <iconify-icon icon="lucide:log-out" style="width:12px;height:12px;color:#333;margin-left:4px;"></iconify-icon>
          </div>
        </div>
      </div>

      <!-- STATS ROW -->
      <div class="stats-row">
        <div class="stat-pill" style="color:#6c5ce7;">
          <iconify-icon icon="lucide:server" class="s-icon"></iconify-icon>
          Servidores <span class="s-count" x-text="servers.length"></span>
        </div>
        <div class="stat-pill" style="color:#3498db;">
          <iconify-icon icon="lucide:memory-stick" class="s-icon"></iconify-icon>
          RAM <span class="s-count" x-text="totalRam + ' GB'"></span>
        </div>
        <div class="stat-pill" style="color:#1abc9c;">
          <iconify-icon icon="lucide:hard-drive" class="s-icon"></iconify-icon>
          Discos <span class="s-count" x-text="totalStorageTB + ' TB'"></span>
        </div>
        <div class="stat-pill" style="color:#f39c12;">
          <iconify-icon icon="lucide:cpu" class="s-icon"></iconify-icon>
          CPU <span class="s-count" x-text="totalCpuGHz + ' GHz'"></span>
        </div>
      </div>

      <!-- TASK SUMMARY -->
      <div class="task-summary" x-show="!loading && pendingTasksSummary.total > 0">
        <span class="task-summary-item critical" x-show="pendingTasksSummary.critica > 0">
          <iconify-icon icon="lucide:triangle-alert" style="width:12px;height:12px;"></iconify-icon>
          Cr&iacute;ticas: <strong x-text="pendingTasksSummary.critica"></strong>
        </span>
        <span class="task-summary-item config" x-show="pendingTasksSummary.configuracion > 0">
          <iconify-icon icon="lucide:settings" style="width:12px;height:12px;"></iconify-icon>
          Config: <strong x-text="pendingTasksSummary.configuracion"></strong>
        </span>
        <span class="task-summary-item normal" x-show="pendingTasksSummary.normal > 0">
          <iconify-icon icon="lucide:info" style="width:12px;height:12px;"></iconify-icon>
          Normales: <strong x-text="pendingTasksSummary.normal"></strong>
        </span>
      </div>

      <!-- PREVENTIVE MAINTENANCE COUNTDOWN ALERTS -->
      <div class="maint-alert-bar" x-show="!loading && upcomingMaintenanceTasks.length > 0">
        <span style="font-size:0.68rem;color:#f39c12;font-weight:700;display:inline-flex;align-items:center;gap:0.35rem;white-space:nowrap;">
          <iconify-icon icon="lucide:calendar-clock" style="width:14px;height:14px;"></iconify-icon>
          Mantenimientos Preventivos:
        </span>
        <template x-for="t in upcomingMaintenanceTasks.slice(0, 4)" :key="t.id">
          <a :href="'server-detail.html?id=' + t.server_id" @click.prevent="gotoServer(t.server_id)" style="text-decoration:none;display:inline-flex;align-items:center;gap:0.35rem;">
            <span style="font-size:0.68rem;color:#ddd;" x-text="t.hostname + ': ' + t.titulo"></span>
            <span class="countdown-pill" :class="getCountdownClass(t.fecha_limite)" x-text="getCountdownText(t.fecha_limite)"></span>
          </a>
        </template>
      </div>

      <!-- ACTION TOOLBAR -->
      <div class="admin-toolbar" x-show="!loading" style="display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap;margin-bottom:0.75rem;">
        <a class="at-btn" href="add-server.html" x-show="canEdit" @click.prevent="window.location.href='add-server.html'">
          <iconify-icon icon="lucide:plus" style="pointer-events:none;"></iconify-icon>
          Agregar Servidor
        </a>
        <button class="at-btn" @click="refreshServers()">
          <iconify-icon icon="lucide:refresh-cw" style="pointer-events:none;"></iconify-icon>
          Recargar
        </button>
        <button class="at-btn" @click="exportCSV()">
          <iconify-icon icon="lucide:file-down" style="pointer-events:none;"></iconify-icon>
          Exportar CSV
        </button>
      </div>

      <!-- VIEW TABS (Segmented Control with Live Count Badges) -->
      <div class="view-tabs" x-show="!loading">
        <button class="view-tab" :class="activeView === 'servers' ? 'active' : ''" @click="activeView='servers'">
          <iconify-icon icon="lucide:server"></iconify-icon>
          Servidores
          <span class="view-tab-count" x-text="servers.length"></span>
        </button>
        <button class="view-tab" :class="activeView === 'services' ? 'active' : ''" @click="activeView='services'">
          <iconify-icon icon="lucide:boxes"></iconify-icon>
          Servicios
          <span class="view-tab-count" x-text="allServices.length"></span>
        </button>
        <button class="view-tab" :class="activeView === 'network' ? 'active' : ''" @click="activeView='network'">
          <iconify-icon icon="lucide:network"></iconify-icon>
          Redes
          <span class="view-tab-count" x-text="allIPs.length + ' IPs'"></span>
        </button>
        <button class="view-tab" :class="activeView === 'all' ? 'active' : ''" @click="activeView='all'">
          <iconify-icon icon="lucide:layout-grid"></iconify-icon>
          Infraestructura
          <span class="view-tab-count" x-text="servers.length"></span>
        </button>
      </div>

      <!-- SKELETON LOADING -->
      <div class="bento-grid" x-show="loading">
        <template x-for="i in 8" :key="i">
          <div class="kanban-card" style="padding:1rem;">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-text" style="margin-top:0.75rem;"></div>
            <div class="skeleton skeleton-text w60"></div>
            <div class="skeleton skeleton-text w40"></div>
          </div>
        </template>
      </div>

      <!-- ===== VIEW: SERVIDORES ===== -->
      <template x-if="activeView === 'servers'">
        <div>
          <!-- FILTER TABS -->
          <div class="filter-tabs" x-show="!loading">
            <button class="filter-tab" :class="activeFilter === 'todos' ? 'active' : ''" @click="activeFilter = 'todos'">
              <iconify-icon icon="lucide:layout-grid" class="filter-icon"></iconify-icon>
              Todos
              <span class="filter-count" x-text="servers.length"></span>
            </button>
            <button class="filter-tab" :class="activeFilter === 'Activo' ? 'active' : ''" @click="activeFilter = 'Activo'">
              <span class="filter-dot dot-activo"></span>
              Activo
              <span class="filter-count" x-text="countByStatus('Activo')"></span>
            </button>
            <button class="filter-tab" :class="activeFilter === 'Inactivo' ? 'active' : ''" @click="activeFilter = 'Inactivo'">
              <span class="filter-dot dot-inactivo"></span>
              Inactivo
              <span class="filter-count" x-text="countByStatus('Inactivo')"></span>
            </button>
            <button class="filter-tab" :class="activeFilter === 'Pendiente' ? 'active' : ''" @click="activeFilter = 'Pendiente'">
              <span class="filter-dot dot-pendiente"></span>
              Pendiente
              <span class="filter-count" x-text="countByStatus('Pendiente')"></span>
            </button>
            <button class="filter-tab" :class="activeFilter === 'Libre' ? 'active' : ''" @click="activeFilter = 'Libre'">
              <span class="filter-dot dot-libre"></span>
              Libre
              <span class="filter-count" x-text="countByStatus('Libre')"></span>
            </button>
          </div>

          <!-- BENTO GRID -->
          <div class="bento-grid" x-show="filteredServers.length > 0">
            <template x-for="s in filteredServers" :key="s.id">
              <div class="kanban-card" :class="'severity-' + (serverCardSeverity(s.id) || 'none')" @click="openQuickServer(s)" tabindex="0" @keydown.enter.prevent="openQuickServer(s)">
                
                <!-- Card Identity Header -->
                <div class="card-section card-section--identity">
                  <div class="card-top">
                    <div class="card-icon-box" :title="'Estado: ' + s.estado">
                      <iconify-icon icon="lucide:server" :style="'color:' + (s.estado === 'activo' ? 'var(--c-online)' : (s.estado === 'mantenimiento' ? '#f39c12' : 'var(--c-offline)'))"></iconify-icon>
                    </div>
                    <div class="card-title-group">
                      <strong class="card-hostname" x-text="s.hostname"></strong>
                      <span class="card-model-tag" x-show="s.modelo" x-text="s.modelo"></span>
                    </div>
                    <div class="card-actions" @click.stop>
                      <button class="icon-btn" @click.stop="gotoServer(s.id)" title="Ver ficha completa">
                        <iconify-icon icon="lucide:arrow-right"></iconify-icon>
                      </button>
                      <div class="kebab-wrap" x-show="canEdit" @click.stop.outside="openKebabId = null">
                        <button class="icon-btn" @click.stop="openKebabId = openKebabId === s.id ? null : s.id" title="Opciones">
                          <iconify-icon icon="lucide:more-vertical"></iconify-icon>
                        </button>
                        <div class="kebab-dropdown" x-show="openKebabId === s.id" x-transition>
                          <a class="kebab-item" :href="'edit-server.html?id=' + s.id" x-show="canEdit" @click.prevent="openKebabId = null; window.location.href = 'edit-server.html?id=' + s.id">
                            <iconify-icon icon="lucide:pencil"></iconify-icon> Editar
                          </a>
                          <a class="kebab-item" :href="'https://' + credsMap[s.id]?.ipmi" target="_blank" x-show="credsMap[s.id]?.ipmi" @click="openKebabId = null">
                            <iconify-icon icon="lucide:monitor"></iconify-icon> IPMI
                          </a>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="card-meta-row">
                    <span title="Ubicación">
                      <iconify-icon icon="lucide:map-pin" class="meta-icon"></iconify-icon>
                      <span x-text="s.ubicacion"></span>
                    </span>
                    <span x-show="s.sn" title="Número de Serie">
                      <iconify-icon icon="lucide:hash" class="meta-icon"></iconify-icon>
                      <span x-text="s.sn"></span>
                    </span>
                  </div>
                </div>

                <!-- Card Info / Tags -->
                <div class="card-section card-section--info" x-show="serverTagsMap[s.id] && serverTagsMap[s.id].length > 0">
                  <div class="card-tags-row">
                    <template x-for="(t, ti) in serverTagsMap[s.id].slice(0, 5)" :key="ti">
                      <span class="card-tag-pill" :style="'background:' + t.color + '18;color:' + t.color + ';border-color:' + t.color + '35;display:inline-flex;align-items:center;gap:0.25rem;'" :title="t.name">
                        <iconify-icon icon="lucide:tag" style="width:11px;height:11px;flex-shrink:0;"></iconify-icon>
                        <span x-text="t.name"></span>
                      </span>
                    </template>
                    <span class="card-tag-extra" x-show="serverTagsMap[s.id] && serverTagsMap[s.id].length > 5" x-text="'+' + (serverTagsMap[s.id].length - 5)" :title="(serverTagsMap[s.id].length - 5) + ' tags adicionales'"></span>
                  </div>
                </div>

                <!-- Card Footer -->
                <div class="card-section card-section--footer">
                  <div class="card-status-label" :class="'sl-' + (s.estado ? s.estado.toLowerCase() : '')" :title="'Estado: ' + s.estado">
                    <span class="sl-dot"></span>
                    <span x-text="s.estado"></span>
                  </div>
                  
                  <a :href="'server-detail.html?id=' + s.id" @click.prevent.stop="window.location.href='server-detail.html?id=' + s.id" class="card-task-badge" x-show="pendingTasksMap[s.id] && pendingTasksMap[s.id].length > 0" title="Tareas pendientes">
                    <iconify-icon x-show="serverCardSeverity(s.id) === 'critical'" icon="lucide:triangle-alert" style="color:#e74c3c;"></iconify-icon>
                    <iconify-icon x-show="serverCardSeverity(s.id) === 'config'" icon="lucide:settings" style="color:#f39c12;"></iconify-icon>
                    <iconify-icon x-show="serverCardSeverity(s.id) === 'other'" icon="lucide:info" style="color:#2ecc71;"></iconify-icon>
                    <span x-text="pendingTasksMap[s.id].length"></span>
                  </a>
                </div>

              </div>
            </template>
          </div>

          <!-- Empty state -->
          <div class="empty-state" x-show="!loading && filteredServers.length === 0">
            <iconify-icon icon="lucide:server"></iconify-icon>
            <h3 x-show="activeFilter !== 'todos' || searchQuery">Sin resultados</h3>
            <h3 x-show="activeFilter === 'todos' && !searchQuery">No hay servidores registrados</h3>
            <p x-show="activeFilter === 'todos' && !searchQuery">Agrega tu primer servidor para comenzar</p>
            <p x-show="activeFilter !== 'todos'">Ning&uacute;n servidor con estado <strong x-text="activeFilter"></strong></p>
            <p x-show="searchQuery">Ning&uacute;n servidor coincide con "<strong x-text="searchQuery"></strong>"</p>
            <a class="btn" href="add-server.html" x-show="canEdit && activeFilter === 'todos' && !searchQuery" @click.prevent="window.location.href='add-server.html'">Agregar servidor</a>
          </div>
        </div>
      </template>

      <!-- ===== VIEW: SERVICIOS ===== -->
      <template x-if="activeView === 'services'">
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
            <div style="font-size:0.72rem;color:#888;">
              Servicios registrados en la infraestructura y accesos directos por IP:Puerto
            </div>
            <button class="at-btn" @click="exportServicesCSV()" title="Exportar servicios en CSV">
              <iconify-icon icon="lucide:file-down" style="pointer-events:none;"></iconify-icon>
              Exportar CSV
            </button>
          </div>
          
          <div class="services-grid">
            <template x-for="svc in allServices" :key="svc.nombre">
              <div class="svc-card">
                <div class="svc-header" style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;padding-bottom:0.5rem;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:0.6rem;">
                  <div style="display:flex;align-items:center;gap:0.4rem;">
                    <iconify-icon icon="lucide:box" style="width:16px;height:16px;color:#6c5ce7;"></iconify-icon>
                    <strong x-text="svc.nombre" style="font-size:0.85rem;color:#fff;"></strong>
                  </div>
                  <div style="display:flex;align-items:center;gap:0.35rem;">
                    <span class="svc-puerto" x-show="svc.puerto" x-text="'Puerto ' + svc.puerto" style="background:rgba(108,92,231,0.15);color:#8e7ff3;padding:0.15rem 0.45rem;border-radius:6px;font-weight:600;font-size:0.64rem;border:1px solid rgba(108,92,231,0.3);"></span>
                    <span class="svc-count" x-text="svc.servers.length + ' servidores'" style="font-size:0.62rem;color:#888;"></span>
                  </div>
                </div>

                <div class="svc-servers" style="display:flex;flex-direction:column;gap:0.45rem;">
                  <template x-for="s in svc.servers" :key="s.id + (s._svcIp || '')">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;padding:0.4rem 0.6rem;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.04);border-radius:8px;">
                      <!-- SERVER LINK -->
                      <a :href="'server-detail.html?id=' + s.id" @click.prevent="gotoServer(s.id)" style="display:inline-flex;align-items:center;gap:0.35rem;text-decoration:none;color:#ccc;font-size:0.75rem;font-weight:600;" title="Ver detalle del servidor">
                        <span class="status-dot" :class="'dot-' + (s.estado ? s.estado.toLowerCase() : 'libre')"></span>
                        <span x-text="s.hostname"></span>
                      </a>

                      <!-- DIRECT IP:PORT REDIRECTION BUTTON -->
                      <template x-if="s._directUrl">
                        <a :href="s._directUrl" target="_blank" title="Abrir servicio en nueva pestaña" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.25rem 0.55rem;background:rgba(108,92,231,0.18);color:#8e7ff3;border:1px solid rgba(108,92,231,0.4);border-radius:6px;font-size:0.68rem;font-weight:600;text-decoration:none;transition:all 0.15s;">
                          <iconify-icon icon="lucide:external-link" style="width:12px;height:12px;pointer-events:none;"></iconify-icon>
                          <span x-text="s._svcIp + (s._svcPuerto ? ':' + s._svcPuerto : '')"></span>
                        </a>
                      </template>
                      <template x-if="!s._directUrl">
                        <span style="font-size:0.62rem;color:#555;">Sin IP asignada</span>
                      </template>

                      <!-- SERVICE CREDENTIALS (Superadmin & Admin only) -->
                      <template x-if="canEdit && (s._svcUsuario || s._svcPassword)">
                        <div style="display:inline-flex;align-items:center;gap:0.4rem;font-size:0.65rem;color:#aaa;background:rgba(0,0,0,0.3);padding:0.2rem 0.45rem;border-radius:5px;border:1px solid rgba(255,255,255,0.05);">
                          <iconify-icon icon="lucide:key" style="width:11px;height:11px;color:#e74c3c;"></iconify-icon>
                          <span x-show="s._svcUsuario" style="color:#ccc;">User: <strong style="color:#fff;" x-text="s._svcUsuario"></strong></span>
                          <span x-show="s._svcPassword" @click="copyToClipboard(s._svcPassword)" title="Clic para copiar contraseña al portapapeles" style="display:inline-flex;align-items:center;gap:0.25rem;cursor:pointer;">
                            <code style="color:#888;letter-spacing:2px;">••••••••</code>
                            <iconify-icon icon="lucide:copy" style="width:11px;height:11px;color:#8e7ff3;"></iconify-icon>
                          </span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>

          <div class="empty-state" x-show="allServices.length === 0">
            <iconify-icon icon="lucide:box"></iconify-icon>
            <h3>Sin servicios registrados</h3>
            <p>Los servicios aparecerán aquí cuando los agregues a un servidor</p>
          </div>
        </div>
      </template>

      <!-- ===== VIEW: REDES ===== -->
      <template x-if="activeView === 'network'">
        <div>
          <!-- HEADER CONTROLS & COLUMN FILTERS BAR -->
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap;gap:0.5rem;">
            <div style="font-size:0.72rem;color:#888;">
              Mapa dinámico de Direcciones IP y Subredes de la Infraestructura
            </div>
            <button class="at-btn" @click="exportNetworkCSV()" title="Exportar redes en CSV">
              <iconify-icon icon="lucide:file-down" style="pointer-events:none;"></iconify-icon>
              Exportar CSV
            </button>
          </div>

          <!-- NETWORK STATS -->
          <div class="network-stats">
            <div class="net-stat">
              <span class="net-stat-value" x-text="filteredIPs.length"></span>
              IPs filtradas
            </div>
            <div class="net-stat">
              <span class="net-stat-value" x-text="uniqueSubnets.length"></span>
              Subredes
            </div>
          </div>

          <!-- COLUMN FILTERS BAR -->
          <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border-subtle);border-radius:10px;padding:0.6rem 0.85rem;margin-bottom:0.85rem;display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center;">
            <span style="font-size:0.68rem;color:#8e7ff3;font-weight:700;display:flex;align-items:center;gap:0.3rem;">
              <iconify-icon icon="lucide:filter" style="width:13px;height:13px;"></iconify-icon>
              Filtros de Columna:
            </span>
            <input type="text" x-model="netIpFilter" placeholder="Buscar IP..." style="font-size:0.72rem;padding:0.3rem 0.5rem;border-radius:6px;border:1px solid var(--border-subtle);background:var(--bg-dark);color:var(--text-main);width:140px;">
            <select x-model="netTypeFilter" style="font-size:0.72rem;padding:0.3rem 0.5rem;border-radius:6px;border:1px solid var(--border-subtle);background:var(--bg-dark);color:var(--text-main);width:130px;">
              <option value="">Tipo (Todos)</option>

          </div>
          <div class="det-meta" style="display:flex;gap:0.75rem;font-size:0.65rem;color:#666;margin-bottom:1rem;flex-wrap:wrap;">
            <span><span style="color:#999;">Fecha:</span> <span x-text="formatDate(auditDetailItem?.created_at)" style="color:#ccc;"></span></span>
            <span><span style="color:#999;">Usuario:</span> <span x-text="auditDetailItem?.user_email || auditDetailItem?.user_id?.slice(0,8) || '—'" style="color:#ccc;"></span></span>
            <span x-show="auditDetailItem?.server_id"><span style="color:#999;">Servidor:</span>
              <a :href="'server-detail.html?id=' + auditDetailItem?.server_id" @click.prevent="window.location.href='server-detail.html?id=' + auditDetailItem?.server_id" style="color:#6c5ce7;text-decoration:none;" x-text="auditDetailItem?.descripcion?.split(':')[0] || '#' + auditDetailItem?.server_id"></a>
            </span>
          </div>
          <template x-if="auditDetailItem?.cambios && typeof auditDetailItem.cambios === 'object' && Object.keys(auditDetailItem.cambios).length > 0">
            <div>
              <div style="font-size:0.65rem;color:#999;margin-bottom:0.4rem;">Campos modificados:</div>
              <div class="audit-diff-table">
                <template x-for="(val, field) in auditDetailItem.cambios" :key="field">
                  <div class="audit-diff-row">
                    <div class="ad-field" x-text="field"></div>
                    <div class="ad-values">
                      <div class="ad-old" x-text="formatDiffVal(val?.old)"></div>
                      <div class="ad-arrow"><iconify-icon icon="lucide:arrow-right" style="width:12px;height:12px;"></iconify-icon></div>
                      <div class="ad-new" x-text="formatDiffVal(val?.new)"></div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>
          <div x-show="!auditDetailItem?.cambios || typeof auditDetailItem?.cambios !== 'object' || Object.keys(auditDetailItem.cambios).length === 0" style="color:#555;font-size:0.7rem;padding:0.5rem 0;">
            Sin detalle de cambios
          </div>
          <button class="btn" @click="auditDetailItem = null" style="margin-top:1rem;">Cerrar</button>
        </div>
      </template>
    </div>
  </div>

  <!-- MODAL: VISTA RÁPIDA DE SERVIDOR (POPUP INDEPENDIENTE) -->
  <div class="modal-overlay" x-show="Boolean(quickServerItem)" x-cloak @click.self="closeQuickServer()" @keydown.escape.window="closeQuickServer()">
    <div class="modal" style="max-width:640px;width:92%;padding:1.5rem;" x-show="Boolean(quickServerItem)">
      <template x-if="quickServerItem">
        <div>
          <!-- Header -->
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border-subtle);">
            <div style="display:flex;align-items:center;gap:0.6rem;">
              <div class="card-icon-box" style="width:40px;height:40px;border-radius:10px;background:rgba(108,92,231,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <iconify-icon icon="lucide:server" style="width:20px;height:20px;color:#6c5ce7;"></iconify-icon>
              </div>
              <div>
                <div style="display:flex;align-items:center;gap:0.5rem;">
                  <h3 style="margin:0;font-size:1.1rem;font-weight:700;color:#fff;" x-text="quickServerItem.hostname"></h3>
                  <div class="card-status-label" :class="'sl-' + (quickServerItem.estado ? quickServerItem.estado.toLowerCase() : '')" style="padding:0.15rem 0.5rem;font-size:0.6rem;">
                    <span class="sl-dot"></span>
                    <span x-text="quickServerItem.estado"></span>
                  </div>
                </div>
                <div style="font-size:0.68rem;color:#888;margin-top:0.15rem;display:flex;gap:0.75rem;flex-wrap:wrap;">
                  <span><iconify-icon icon="lucide:map-pin" style="width:11px;height:11px;color:#6c5ce7;margin-right:2px;"></iconify-icon><span x-text="quickServerItem.ubicacion"></span></span>
                  <span x-show="quickServerItem.modelo"><iconify-icon icon="lucide:box" style="width:11px;height:11px;color:#888;margin-right:2px;"></iconify-icon><span x-text="quickServerItem.modelo"></span></span>
                  <span x-show="quickServerItem.sn"><iconify-icon icon="lucide:hash" style="width:11px;height:11px;color:#888;margin-right:2px;"></iconify-icon><span x-text="quickServerItem.sn"></span></span>
                </div>
              </div>
            </div>
            <button class="icon-btn" @click="closeQuickServer()" title="Cerrar (Esc)" style="background:transparent;border:none;color:#888;cursor:pointer;">
              <iconify-icon icon="lucide:x" style="width:18px;height:18px;"></iconify-icon>
            </button>
          </div>

          <!-- Quick Actions Bar -->
          <div style="display:flex;gap:0.4rem;margin-bottom:1rem;flex-wrap:wrap;">
            <button class="btn" @click="gotoServer(quickServerItem.id)" style="display:inline-flex;align-items:center;gap:0.35rem;font-size:0.7rem;padding:0.35rem 0.75rem;background:#6c5ce7;color:#fff;border-radius:6px;border:none;cursor:pointer;">
              <iconify-icon icon="lucide:external-link" style="width:13px;height:13px;"></iconify-icon>
              Ficha Técnica Completa
            </button>
            <a class="btn" :href="'edit-server.html?id=' + quickServerItem.id" x-show="canEdit" @click.prevent="closeQuickServer(); window.location.href = 'edit-server.html?id=' + quickServerItem.id" style="display:inline-flex;align-items:center;gap:0.35rem;font-size:0.7rem;padding:0.35rem 0.75rem;background:var(--bg-dark);color:#ccc;border-radius:6px;border:1px solid var(--border-subtle);text-decoration:none;">
              <iconify-icon icon="lucide:pencil" style="width:13px;height:13px;color:#6c5ce7;"></iconify-icon>
              Editar
            </a>
            <a class="btn" :href="'https://' + credsMap[quickServerItem.id]?.ipmi" target="_blank" x-show="credsMap[quickServerItem.id]?.ipmi" style="display:inline-flex;align-items:center;gap:0.35rem;font-size:0.7rem;padding:0.35rem 0.75rem;background:rgba(108,92,231,0.12);color:#8e7ff3;border-radius:6px;border:1px solid rgba(108,92,231,0.3);text-decoration:none;">
              <iconify-icon icon="lucide:monitor" style="width:13px;height:13px;"></iconify-icon>
              Acceso IPMI
            </a>
          </div>

          <!-- Content Grid -->
          <div style="display:flex;flex-direction:column;gap:0.85rem;max-height:60vh;overflow-y:auto;padding-right:0.25rem;">
            
            <!-- Hardware -->
            <div style="background:rgba(0,0,0,0.2);border:1px solid var(--border-subtle);border-radius:8px;padding:0.75rem;">
              <div style="font-size:0.65rem;color:#6c5ce7;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.3rem;">
                <iconify-icon icon="lucide:cpu" style="width:13px;height:13px;"></iconify-icon>
                Especificaciones de Hardware
              </div>
              <div style="font-size:0.75rem;display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:0.5rem;color:#ccc;">
                <div>
                  <span style="color:#777;display:block;font-size:0.62rem;">PROCESADOR</span>
                  <strong style="font-weight:600;" x-text="quickServerItem.procesador || '—'"></strong>
                </div>
                <div>
                  <span style="color:#777;display:block;font-size:0.62rem;">MEMORIA RAM</span>
                  <strong style="font-weight:600;" x-text="quickServerItem.ram_gb ? quickServerItem.ram_gb + ' GB' : '—'"></strong>
                </div>
                <div>
                  <span style="color:#777;display:block;font-size:0.62rem;">TIPO HARDWARE</span>
                  <span x-text="quickServerItem.tipo_hardware || '—'"></span>
                </div>
                <div>
                  <span style="color:#777;display:block;font-size:0.62rem;">MARCA / FABRICANTE</span>
                  <span x-text="quickServerItem.marca || '—'"></span>
                </div>
              </div>

              <!-- Storage -->
              <div x-show="diskList(quickServerItem).length > 0" style="margin-top:0.6rem;padding-top:0.5rem;border-top:1px solid rgba(255,255,255,0.05);">
                <span style="color:#777;display:block;font-size:0.62rem;margin-bottom:0.25rem;">UNIDADES DE ALMACENAMIENTO / RAID</span>
                <div style="display:flex;gap:0.3rem;flex-wrap:wrap;">
                  <template x-for="d in diskList(quickServerItem)" :key="d.bay + d.tipo">
                    <span style="background:rgba(255,255,255,0.04);border:1px solid var(--border-subtle);border-radius:5px;padding:0.15rem 0.45rem;font-size:0.65rem;color:#aaa;display:inline-flex;align-items:center;gap:0.25rem;">
                      <iconify-icon icon="lucide:hard-drive" style="width:11px;height:11px;color:#6c5ce7;"></iconify-icon>
                      <span x-text="(d.bay ? d.bay + ': ' : '') + (d.tipo || '') + (d.tamano ? ' ' + d.tamano : '')"></span>
                    </span>
                  </template>
                </div>
              </div>
            </div>

            <!-- Network & Services -->
            <div style="background:rgba(0,0,0,0.2);border:1px solid var(--border-subtle);border-radius:8px;padding:0.75rem;">
              <div style="font-size:0.65rem;color:#2ecc71;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.3rem;">
                <iconify-icon icon="lucide:globe" style="width:13px;height:13px;"></iconify-icon>
                Servicios y Redes
              </div>
              <div x-show="quickServerItem.servicios && quickServerItem.servicios.length > 0" style="display:flex;flex-direction:column;gap:0.3rem;">
                <template x-for="svc in (quickServerItem.servicios || [])" :key="svc.nombre">
                  <div style="font-size:0.7rem;color:#ccc;background:rgba(255,255,255,0.03);border-radius:6px;padding:0.35rem 0.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.3rem;">
                    <div style="display:flex;align-items:center;gap:0.35rem;">
                      <iconify-icon icon="lucide:globe" style="width:12px;height:12px;color:#2ecc71;"></iconify-icon>
                      <span style="font-weight:600;color:#fff;" x-text="svc.nombre"></span>
                    </div>
                    <div style="display:flex;gap:0.25rem;align-items:center;flex-wrap:wrap;">
                      <!-- IPs (Superadmin & Admin only) -->
                      <template x-if="canEdit">
                        <div style="display:flex;gap:0.25rem;align-items:center;">
                          <template x-for="ip in (svc.ips || [])" :key="ip">
                            <a :href="'https://' + ip" target="_blank" style="color:#6c5ce7;text-decoration:none;font-size:0.62rem;background:rgba(108,92,231,0.15);padding:0.1rem 0.35rem;border-radius:4px;" x-text="ip"></a>
                          </template>
                        </div>
                      </template>
                      <!-- Service Credentials (Superadmin & Admin only) -->
                      <template x-if="canEdit && (svc.usuario || svc.password)">
                        <div style="display:inline-flex;align-items:center;gap:0.35rem;font-size:0.62rem;color:#aaa;background:rgba(0,0,0,0.3);padding:0.1rem 0.35rem;border-radius:4px;border:1px solid rgba(255,255,255,0.05);">
                          <iconify-icon icon="lucide:key" style="width:10px;height:10px;color:#e74c3c;"></iconify-icon>
                          <span x-show="svc.usuario" style="color:#ccc;" x-text="svc.usuario"></span>
                          <span x-show="svc.password" @click="copyToClipboard(svc.password)" title="Clic para copiar contraseña al portapapeles" style="display:inline-flex;align-items:center;gap:0.2rem;cursor:pointer;">
                            <code style="color:#888;letter-spacing:2px;">••••••••</code>
                            <iconify-icon icon="lucide:copy" style="width:10px;height:10px;color:#8e7ff3;"></iconify-icon>
                          </span>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
              <div x-show="!quickServerItem.servicios || quickServerItem.servicios.length === 0" style="font-size:0.7rem;color:#666;">
                Sin servicios configurados
              </div>
            </div>

            <!-- Notes -->
            <div x-show="quickServerItem.notas" style="background:rgba(0,0,0,0.2);border:1px solid var(--border-subtle);border-radius:8px;padding:0.75rem;">
              <div style="font-size:0.65rem;color:#f39c12;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;margin-bottom:0.3rem;display:flex;align-items:center;gap:0.3rem;">
                <iconify-icon icon="lucide:file-text" style="width:13px;height:13px;"></iconify-icon>
                Notas del Servidor
              </div>
              <p style="font-size:0.72rem;color:#bbb;margin:0;line-height:1.5;white-space:pre-wrap;" x-text="quickServerItem.notas"></p>
            </div>

            <!-- Tags -->
            <div x-show="serverTagsMap[quickServerItem.id] && serverTagsMap[quickServerItem.id].length > 0">
              <div style="font-size:0.62rem;color:#777;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;margin-bottom:0.3rem;">Tags Asociados</div>
              <div style="display:flex;gap:0.3rem;flex-wrap:wrap;">
                <template x-for="t in (serverTagsMap[quickServerItem.id] || [])" :key="t.id">
                  <span class="card-tag-pill" :style="'background:' + t.color + '22;color:' + t.color + ';border-color:' + t.color + '44;padding:0.15rem 0.45rem;font-size:0.65rem;'">
                    <span class="card-tag-dot" :style="'background:' + t.color"></span>
                    <span x-text="t.name"></span>
                  </span>
                </template>
              </div>
            </div>

          </div>

          <!-- Footer -->
          <div style="margin-top:1.25rem;padding-top:0.75rem;border-top:1px solid var(--border-subtle);display:flex;justify-content:flex-end;">
            <button class="btn" @click="closeQuickServer()" style="font-size:0.75rem;padding:0.35rem 0.85rem;background:var(--bg-dark);border:1px solid var(--border-subtle);color:#888;border-radius:6px;cursor:pointer;">Cerrar</button>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/toast.js"></script>
<script src="js/audit.js"></script>
<script src="js/app.js"></script>

<!-- Toast container -->
<div x-data x-show="$store.toast.items.length" class="toast-container">
  <template x-for="t in $store.toast.items" :key="t.id">
    <div class="toast" :class="t.type">
      <iconify-icon icon="lucide:check-circle" x-show="t.type==='success'" style="width:16px;height:16px;color:#2ecc71;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:alert-circle" x-show="t.type==='error'" style="width:16px;height:16px;color:#e74c3c;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:info" x-show="t.type==='info'" style="width:16px;height:16px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
      <span x-text="t.message"></span>
    </div>
  </template>
</div>
</body>
</html>
