<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Tags</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body>
<div x-data="tagsApp()" x-init="init()">
  <div class="container" style="max-width:960px;padding:2rem 1rem;">
    <!-- HEADER (Unified Top Navigation Bar) -->
    <div class="topbar" style="margin-bottom:1.5rem;">
      <div>
        <h1>
          <iconify-icon icon="lucide:tag" class="logo-icon"></iconify-icon>
          BASTIONX LAB
          <small>gestión de tags</small>
        </h1>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <button class="at-btn" @click="openAdd()" title="Crear nuevo tag" style="background:rgba(108,92,231,0.15);color:#8e7ff3;border:1px solid rgba(108,92,231,0.3);padding:0.35rem 0.75rem;border-radius:8px;font-weight:600;">
          <iconify-icon icon="lucide:plus" style="pointer-events:none;"></iconify-icon>
          Nuevo tag
        </button>
        <a class="at-btn" href="dashboard.html" @click.prevent="window.location.href='dashboard.html'" title="Volver al Dashboard">
          <iconify-icon icon="lucide:arrow-left" style="pointer-events:none;"></iconify-icon>
          Volver al Dashboard
        </a>
      </div>
    </div>

    <div class="tag-grid" x-show="tags.length > 0">
      <template x-for="t in tags" :key="t.id">
        <div class="tag-manager-card">
          <span class="tm-pill" :style="'background:' + t.color + '20;color:' + t.color + ';border:1px solid ' + t.color + '40;'">
            <span class="tm-dot" :style="'background:' + t.color + ';box-shadow:0 0 6px ' + t.color + '60;'"></span>
            <span x-text="t.name"></span>
          </span>
          <div class="tm-actions">
            <button class="btn-icon" @click="openEdit(t)" title="Editar">
              <iconify-icon icon="lucide:pencil" style="width:13px;height:13px;"></iconify-icon>
            </button>
            <button class="btn-icon danger" @click="deleteTag(t.id)" title="Eliminar">
              <iconify-icon icon="lucide:trash-2" style="width:13px;height:13px;"></iconify-icon>
            </button>
          </div>
        </div>
      </template>
    </div>

    <div x-show="tags.length === 0 && !loading" style="color:#555;font-size:0.8rem;padding:3rem;text-align:center;">No hay tags creados.</div>

    <!-- DELETE CONFIRM -->
    <div class="modal-overlay" x-show="showDeleteConfirm" x-cloak @click.self="cancelDelete()">
      <div class="modal" style="max-width:380px;text-align:center;">
        <h3 style="color:#e74c3c;">¿Eliminar tag?</h3>
        <p style="font-size:0.75rem;color:#666;margin-bottom:1rem;">Esta acción no se puede deshacer. Se eliminará la relación con los servidores que usen este tag.</p>
        <div class="modal-actions" style="justify-content:center;">
          <button class="btn" @click="cancelDelete()">Cancelar</button>
          <button class="btn" @click="confirmDelete()" style="border-color:#e74c3c;color:#e74c3c;">Eliminar</button>
        </div>
      </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" x-show="showModal" x-cloak @click.self="showModal = false">
      <div class="modal" style="max-width:400px;">
        <h3 x-text="editingTag ? 'Editar tag' : 'Nuevo tag'"></h3>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" x-model="form.name" placeholder="Ej: Producción" @keyup.enter="save()">
        </div>
        <div class="form-group">
          <label>Color</label>
          <div class="color-picker-row">
            <input type="color" x-model="form.color" class="color-input">
            <span class="color-preview" :style="'background:' + form.color + ';box-shadow:0 0 12px ' + form.color + '60;'"></span>
            <span class="color-hex" x-text="form.color"></span>
          </div>
          <div class="color-presets">
            <template x-for="c in ['#e74c3c','#e67e22','#f39c12','#2ecc71','#1abc9c','#3498db','#9b59b6','#34495e','#6c5ce7','#e84393']" :key="c">
              <button class="color-swatch" :style="'background:' + c + ';'" @click="form.color = c" :class="form.color === c ? 'active' : ''"></button>
            </template>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn" @click="showModal = false">Cancelar</button>
          <button class="btn" @click="save()" :disabled="!form.name.trim()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/toast.js"></script>
<script src="js/tags-app.js"></script>

<!-- Toast container -->
<div x-data x-show="$store.toast.items.length" class="toast-container">
  <template x-for="t in $store.toast.items" :key="t.id">
    <div class="toast" :class="t.type">
      <iconify-icon icon="lucide:check-circle" x-show="t.type==='success'" style="width:16px;height:16px;color:#2ecc71;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:alert-circle" x-show="t.type==='error'" style="width:16px;height:16px;color:#e74c3c;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:info" x-show="t.type==='info'" style="width:16px;height:16px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
      <span x-text="t.message"></span>
    </div>
  </template>
</div>
</body>
</html>
