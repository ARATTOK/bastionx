<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Tags</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body>
<div x-data="tagsApp()" x-init="init()">
  <div class="container" style="max-width:700px;padding:2rem 1rem;">
    <nav class="breadcrumbs" style="margin-bottom:0.5rem;">
      <a href="dashboard.html">Dashboard</a>
      <span class="sep">/</span>
      <span class="current">Tags</span>
    </nav>
    <div class="topbar" style="margin-bottom:1.5rem;">
      <h1 style="font-size:1.15rem;font-weight:700;color:#fff;margin:0;display:flex;align-items:center;gap:0.6rem;">
        <iconify-icon icon="lucide:tag" style="width:22px;height:22px;color:#6c5ce7;"></iconify-icon>
        Gestionar Tags
      </h1>
      <a href="dashboard.html" class="btn" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.75rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.7rem;background:#12121a;color:#888;text-decoration:none;">
        <iconify-icon icon="lucide:arrow-left" style="width:11px;height:11px;"></iconify-icon>
        Volver
      </a>
    </div>

    <div style="margin-bottom:1rem;">
      <button class="btn" @click="openAdd()" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.4rem 0.8rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.75rem;background:#12121a;color:#6c5ce7;cursor:pointer;">
        <iconify-icon icon="lucide:plus" style="width:12px;height:12px;"></iconify-icon>
        Nuevo tag
      </button>
    </div>

    <div class="tag-grid" x-show="tags.length > 0">
      <template x-for="t in tags" :key="t.id">
        <div class="tag-manager-card">
          <span class="tm-pill" :style="'background:' + t.color + '20;color:' + t.color + ';border:1px solid ' + t.color + '40;'">
            <span class="tm-dot" :style="'background:' + t.color + ';box-shadow:0 0 6px ' + t.color + '60;'"></span>
            <span x-text="t.name"></span>
          </span>
          <div class="tm-actions">
            <button class="btn-icon" @click="openEdit(t)" title="Editar">
              <iconify-icon icon="lucide:pencil" style="width:13px;height:13px;"></iconify-icon>
            </button>
            <button class="btn-icon danger" @click="deleteTag(t.id)" title="Eliminar">
              <iconify-icon icon="lucide:trash-2" style="width:13px;height:13px;"></iconify-icon>
            </button>
          </div>
        </div>
      </template>
    </div>

    <div x-show="tags.length === 0 && !loading" style="color:#555;font-size:0.8rem;padding:3rem;text-align:center;">No hay tags creados.</div>

    <!-- MODAL -->
    <div class="modal-overlay" x-show="showModal" @click.self="showModal = false">
      <div class="modal" style="max-width:400px;">
        <h3 x-text="editingTag ? 'Editar tag' : 'Nuevo tag'"></h3>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" x-model="form.name" placeholder="Ej: Producción" @keyup.enter="save()">
        </div>
        <div class="form-group">
          <label>Color</label>
          <div class="color-picker-row">
            <input type="color" x-model="form.color" class="color-input">
            <span class="color-preview" :style="'background:' + form.color + ';box-shadow:0 0 12px ' + form.color + '60;'"></span>
            <span class="color-hex" x-text="form.color"></span>
          </div>
          <div class="color-presets">
            <template x-for="c in ['#e74c3c','#e67e22','#f39c12','#2ecc71','#1abc9c','#3498db','#9b59b6','#34495e','#6c5ce7','#e84393']" :key="c">
              <button class="color-swatch" :style="'background:' + c + ';'" @click="form.color = c" :class="form.color === c ? 'active' : ''"></button>
            </template>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn" @click="showModal = false">Cancelar</button>
          <button class="btn" @click="save()" :disabled="!form.name.trim()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/toast.js"></script>
<script src="js/tags-app.js"></script>

<!-- Toast container -->
<div x-data x-show="$store.toast.items.length" class="toast-container">
  <template x-for="t in $store.toast.items" :key="t.id">
    <div class="toast" :class="t.type">
      <iconify-icon icon="lucide:check-circle" x-show="t.type==='success'" style="width:16px;height:16px;color:#2ecc71;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:alert-circle" x-show="t.type==='error'" style="width:16px;height:16px;color:#e74c3c;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:info" x-show="t.type==='info'" style="width:16px;height:16px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
      <span x-text="t.message"></span>
    </div>
  </template>
</div>
</body>
</html>
