<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Detalle</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body>
<div x-data="detailApp()" x-init="init()">
  <div class="loading-state" x-show="loading">
    <iconify-icon icon="lucide:loader" style="width:18px;height:18px;color:#6c5ce7;animation:spin 1s linear infinite;"></iconify-icon>
    Cargando servidor...
  </div>

  <template x-if="server">
    <div class="container" style="max-width:800px;padding:2rem 1rem;">
      <!-- TOP BAR -->
      <div class="topbar" style="margin-bottom:1.5rem;">
        <div style="display:flex;align-items:center;gap:0.75rem;">
          <button class="btn" @click="goBack()" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.7rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.7rem;background:#12121a;color:#888;cursor:pointer;">
            <iconify-icon icon="lucide:arrow-left" style="width:11px;height:11px;"></iconify-icon>
            Volver
          </button>
          <h1 style="font-size:1.2rem;font-weight:700;color:#fff;margin:0;">
            <iconify-icon icon="lucide:server" style="width:18px;height:18px;color:#6c5ce7;margin-right:6px;"></iconify-icon>
            <span x-text="server.hostname"></span>
          </h1>
        </div>
        <div style="display:flex;gap:0.4rem;">
          <template x-if="canEdit">
            <button class="btn" @click="goEdit()" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.7rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.7rem;background:#12121a;color:#6c5ce7;cursor:pointer;">
              <iconify-icon icon="lucide:pencil" style="width:12px;height:12px;"></iconify-icon>
              Editar
            </button>
          </template>
          <a href="dashboard.html" class="btn" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.7rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.7rem;background:#12121a;color:#888;text-decoration:none;">
            <iconify-icon icon="lucide:layout-grid" style="width:11px;height:11px;"></iconify-icon>
            Dashboard
          </a>
          <div class="kebab-wrap" x-show="canEdit" @click.outside="showKebab = false">
            <button class="kebab-btn" @click="showKebab = !showKebab" title="Opciones">
              <iconify-icon icon="lucide:ellipsis-vertical"></iconify-icon>
            </button>
            <div class="kebab-dropdown" x-show="showKebab" x-transition>
              <button class="kebab-item" @click="goEdit()" x-show="canEdit">
                <iconify-icon icon="lucide:pencil"></iconify-icon> Editar
              </button>
              <a class="kebab-item" :href="'https://' + serverCreds?.ipmi" target="_blank"
                 x-show="serverCreds?.ipmi" @click="showKebab = false">
                <iconify-icon icon="lucide:monitor"></iconify-icon> IPMI
              </a>
              <div class="kebab-divider"></div>
              <div class="kebab-section-header">Servicios</div>
              <template x-for="(svc, i) in (server.servicios || [])" :key="i">
                <a class="kebab-item" :href="'https://' + svcFirstIp(svc)" target="_blank"
                   x-show="svcFirstIp(svc)" @click="showKebab = false">
                  <iconify-icon icon="lucide:globe"></iconify-icon>
                  <span x-text="svc.nombre"></span>
                </a>
              </template>
            </div>
          </div>
        </div>
      </div>

      <!-- BREADCRUMBS -->
      <nav class="breadcrumbs" style="margin-bottom:0.75rem;">
        <a href="dashboard.html">Dashboard</a>
        <span class="sep">/</span>
        <span class="current" x-text="server.hostname"></span>
      </nav>

      <!-- STATUS BAR -->
      <div class="det-status-bar" :class="'det-' + (server.estado ? server.estado.toLowerCase() : '')">
        <span class="det-status-dot" :class="server.estado ? server.estado.toLowerCase() : ''"></span>
        <span x-text="server.estado"></span>
      </div>

      <!-- TAGS -->
      <div class="det-section" x-show="tags.length > 0">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:tag" style="width:14px;height:14px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
          Tags
        </h2>
        <div class="tags-row">
          <template x-for="t in tags" :key="t.id">
            <span class="tag-pill" :style="'background:' + t.color + '18;color:' + t.color + ';border:1px solid ' + t.color + '30;'">
              <span class="tag-dot" :style="'background:' + t.color + ';'"></span>
              <span x-text="t.name"></span>
            </span>
          </template>
        </div>
      </div>

      <!-- HARDWARE -->
      <div class="det-section">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:cpu" style="width:14px;height:14px;color:#3498db;flex-shrink:0;"></iconify-icon>
          Hardware
        </h2>
        <div class="det-grid-2col">
          <div class="det-field"><span class="det-label">Modelo</span><span class="det-value" x-text="server.modelo || '—'"></span></div>
          <div class="det-field"><span class="det-label">Serial Number</span><span class="det-value" x-text="server.sn || '—'"></span></div>
          <div class="det-field"><span class="det-label">Ubicación</span><span class="det-value" x-text="server.ubicacion || '—'"></span></div>
          <div class="det-field"><span class="det-label">Procesador</span><span class="det-value" x-text="server.procesador || '—'"></span></div>
          <div class="det-field"><span class="det-label">RAM</span><span class="det-value" x-html="server.ram_gb > 0 ? server.ram_gb + ' GB' + (server.ram_modulos ? ' (' + server.ram_modulos + ' módulos' + (server.ram_velocidad ? ', ' + server.ram_velocidad : '') + ')' : '') : '—'"></span></div>
        </div>
      </div>

      <!-- DISKS -->
      <div class="det-section" x-show="diskCount(server) > 0">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:hard-drive" style="width:14px;height:14px;color:#1abc9c;flex-shrink:0;"></iconify-icon>
          Discos <span class="det-count" x-text="diskCount(server)"></span>
        </h2>
        <template x-for="(g, gi) in groupedDisks(server)" :key="gi">
          <div class="disk-group">
            <div class="disk-group-header" x-show="g.nombre">
              <iconify-icon icon="lucide:server" style="width:11px;height:11px;color:#555;"></iconify-icon>
              <span x-text="g.nombre"></span>
              <span class="det-count" x-text="g.discos.length + ' discos'"></span>
            </div>
            <div class="disk-table">
              <div class="disk-row disk-header"><span>Bahía</span><span>Tipo</span><span>Tamaño</span><span>Velocidad</span></div>
              <template x-for="d in g.discos" :key="d.bay">
                <div class="disk-row">
                  <span x-text="d.bay"></span>
                  <span x-text="d.tipo || '—'"></span>
                  <span x-text="d.tamano || '—'"></span>
                  <span x-text="d.velocidad || '—'"></span>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- SERVICIOS -->
      <div class="det-section" x-show="server.servicios && server.servicios.length > 0">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:globe" style="width:14px;height:14px;color:#f39c12;flex-shrink:0;"></iconify-icon>
          Servicios <span class="det-count" x-text="server.servicios.length"></span>
        </h2>
        <template x-for="(svc, i) in server.servicios" :key="i">
          <div class="svc-card">
            <div class="svc-header">
              <strong x-text="svc.nombre"></strong>
              <span class="svc-puerto" x-show="svc.puerto" x-text="'Puerto: ' + svc.puerto"></span>
            </div>
            <div class="svc-ips" x-show="svc.ips && svc.ips.length > 0">
              <iconify-icon icon="lucide:server" style="width:11px;height:11px;color:#555;flex-shrink:0;"></iconify-icon>
              <a class="svc-ip" :href="'https://' + ip" target="_blank" x-text="ip" style="text-decoration:none;"></a>
            </div>
            <div class="svc-desc" x-show="svc.descripcion" x-text="svc.descripcion" style="font-size:0.65rem;color:#555;margin-top:0.2rem;"></div>
          </div>
        </template>
      </div>

      <!-- CREDENCIALES -->
      <div class="det-section" x-show="serverCreds">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:lock" style="width:14px;height:14px;color:#e74c3c;flex-shrink:0;"></iconify-icon>
          Credenciales
        </h2>
        <div class="det-grid-2col">
          <div class="det-field"><span class="det-label">IPMI</span><span class="det-value credential" x-text="serverCreds?.ipmi || '—'"></span></div>
          <div class="det-field">
            <span class="det-label">IP Servicio</span>
            <span class="det-value credential" x-text="serverCreds?.ip_servicio || '—'"></span>
          </div>
          <div class="det-field"><span class="det-label">Usuario</span><span class="det-value credential" x-text="serverCreds?.usuario || '—'"></span></div>
          <div class="det-field"><span class="det-label">Password</span><span class="det-value credential" x-text="serverCreds?.password || '—'"></span></div>
        </div>
        <div class="detail-actions" style="margin-top:0.5rem;" x-show="serverCreds">
          <a class="btn" :href="'https://' + serverCreds?.ipmi" target="_blank" x-show="serverCreds?.ipmi" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.7rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.7rem;background:#12121a;color:#6c5ce7;text-decoration:none;cursor:pointer;">
            <iconify-icon icon="lucide:shield" style="width:11px;height:11px;"></iconify-icon>
            Abrir IPMI
          </a>
          <a class="btn" :href="'https://' + serverCreds?.ip_servicio" target="_blank" x-show="serverCreds?.ip_servicio" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.7rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.7rem;background:#12121a;color:#6c5ce7;text-decoration:none;cursor:pointer;">
            <iconify-icon icon="lucide:globe" style="width:11px;height:11px;"></iconify-icon>
            Abrir IP Servicio
          </a>
        </div>
      </div>

      <!-- TAREAS PENDIENTES -->
      <div class="det-section">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:list-checks" style="width:14px;height:14px;color:#2ecc71;flex-shrink:0;"></iconify-icon>
          Tareas <span class="det-count" x-text="tasks.length"></span>
        </h2>

        <template x-if="tasks.length === 0">
          <div style="font-size:0.7rem;color:#444;padding:0.5rem 0;">No hay tareas para este servidor.</div>
        </template>

        <template x-for="t in tasks" :key="t.id">
          <div class="task-item" :class="{ 'task-done': t.completada }">
            <div style="display:flex;align-items:flex-start;gap:0.5rem;flex:1;">
              <input type="checkbox" :checked="t.completada" @click="toggleTask(t)" style="margin-top:0.15rem;">
              <div style="flex:1;min-width:0;">
                <div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;">
                  <strong style="font-size:0.78rem;color:#ccc;" x-text="t.titulo"></strong>
                  <span class="tsk-badge" :class="taskSeverityClass(t.criticidad)" x-text="taskSeverityLabel(t.criticidad)"></span>
                </div>
                <div style="font-size:0.65rem;color:#555;margin-top:0.15rem;" x-show="t.descripcion" x-text="t.descripcion"></div>
                <div style="font-size:0.55rem;color:#444;margin-top:0.15rem;" x-show="t.completada && t.completed_at">
                  Completada el <span x-text="formatDate(t.completed_at)"></span>
                </div>
                <template x-if="t.completada && taskEvidenceDesc(t.id)">
                  <button @click="viewEvidence(t)" style="background:transparent;border:none;color:#2ecc71;cursor:pointer;font-size:0.6rem;padding:0;margin-top:0.15rem;text-decoration:underline;text-underline-offset:2px;">
                    Ver evidencia
                  </button>
                </template>
              </div>
            </div>
          <template x-if="canEdit">
              <button class="btn-icon danger" @click="deleteTask(t.id)" title="Eliminar tarea" style="flex-shrink:0;">
                <iconify-icon icon="lucide:trash-2" style="width:12px;height:12px;"></iconify-icon>
              </button>
            </template>
          </div>
        </template>

        <template x-if="canEdit">
          <div class="task-add-form">
            <input type="text" x-model="newTaskTitulo" placeholder="Título de la tarea" @keyup.enter="addTask()" style="flex:1;min-width:0;">
            <input type="text" x-model="newTaskDesc" placeholder="Descripción (opcional)" style="flex:1;min-width:0;">
            <select x-model="newTaskCriticidad">
              <option value="normal">Normal</option>
              <option value="configuracion">Configuración</option>
              <option value="critica">Crítica</option>
            </select>
            <button class="btn" @click="addTask()" style="white-space:nowrap;">Agregar</button>
          </div>
        </template>
      </div>

      <!-- BITÁCORA -->
      <div class="det-section" x-show="taskLogs.length > 0">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:history" style="width:14px;height:14px;color:#f39c12;flex-shrink:0;"></iconify-icon>
          Bitácora
        </h2>

        <!-- Log filters -->
        <div class="log-filters" style="display:flex;gap:0.4rem;margin-bottom:0.6rem;">
          <button :class="{ active: logFilter === 'all' }" @click="logFilter = 'all'">Todas</button>
          <button :class="{ active: logFilter === 'completada' }" @click="logFilter = 'completada'">Completadas</button>
          <button :class="{ active: logFilter === 'creada' }" @click="logFilter = 'creada'">Creadas</button>
          <button :class="{ active: logFilter === 'eliminada' }" @click="logFilter = 'eliminada'">Eliminadas</button>
          <button :class="{ active: logFilter === 'desmarcada' }" @click="logFilter = 'desmarcada'">Desmarcadas</button>
        </div>

        <div class="log-list">
          <template x-for="log in filteredLogs" :key="log.id">
            <div class="log-item">
              <span class="log-accion" :class="logAccionClass(log.accion)" x-text="log.accion"></span>
              <span class="log-desc" x-show="log.descripcion" x-text="log.descripcion"></span>
              <span class="log-user" x-text="log.user_email || logUserEmail(log)" style="font-size:0.55rem;color:#888;"></span>
              <span class="log-date" x-text="formatDate(log.created_at)"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- DELETE -->
      <div class="det-section" x-show="canEdit" style="border-top:1px solid var(--border-subtle);padding-top:1.5rem;margin-top:1.5rem;">
        <button class="btn danger" @click="deleteServer()" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.4rem 0.8rem;border:1px solid #e74c3c40;border-radius:8px;font-size:0.75rem;background:#e74c3c10;color:#e74c3c;cursor:pointer;">
          <iconify-icon icon="lucide:trash-2" style="width:12px;height:12px;"></iconify-icon>
          Eliminar servidor
        </button>
      </div>

      <!-- DELETE CONFIRM -->
      <div class="modal-overlay" x-show="showDeleteConfirm" @click.self="showDeleteConfirm = false">
        <div class="modal" style="max-width:380px;text-align:center;">
          <h3 style="color:#e74c3c;">¿Eliminar servidor?</h3>
          <p style="font-size:0.75rem;color:#666;margin-bottom:1rem;">Esta acción no se puede deshacer. Se eliminarán también las credenciales y tags asociados.</p>
          <div class="modal-actions" style="justify-content:center;">
            <button class="btn" @click="showDeleteConfirm = false">Cancelar</button>
            <button class="btn" @click="confirmDelete()" style="border-color:#e74c3c;color:#e74c3c;">Eliminar</button>
          </div>
        </div>
      </div>

      <!-- COMPLETE TASK MODAL -->
      <div class="modal-overlay" x-show="showCompleteModal" @click.self="showCompleteModal = false">
        <div class="modal" style="max-width:480px;">
          <h3>
            <iconify-icon icon="lucide:check-circle" style="width:16px;height:16px;color:#2ecc71;margin-right:6px;"></iconify-icon>
            Completar tarea
          </h3>
          <div class="det-field" style="margin-bottom:0.5rem;" x-show="pendingCompleteTask">
            <span class="det-label" style="font-size:0.65rem;">Tarea</span>
            <span class="det-value" x-text="pendingCompleteTask?.titulo" style="font-size:0.78rem;color:#ccc;"></span>
          </div>
          <div style="font-size:0.72rem;color:#888;margin-bottom:0.75rem;">
            Describe brevemente qué se hizo (se registrará tu usuario y fecha como evidencia):
          </div>
          <textarea x-model="completeTaskDesc" rows="3" placeholder="Ej: Se actualizó el firmware del iLO a versión 2.95..." style="width:100%;padding:0.5rem;font-size:0.78rem;background:var(--bg-dark);border:1px solid var(--border-subtle);border-radius:6px;color:var(--text-main);resize:vertical;font-family:inherit;outline:none;"></textarea>
          <div style="display:flex;gap:0.5rem;margin-top:0.5rem;font-size:0.6rem;color:#555;">
            <span><iconify-icon icon="lucide:user" style="width:10px;height:10px;margin-right:3px;"></iconify-icon><span x-text="user?.email || user?.id?.slice(0,8)"></span></span>
            <span><iconify-icon icon="lucide:clock" style="width:10px;height:10px;margin-right:3px;"></iconify-icon><span x-text="new Date().toLocaleString('es-ES')"></span></span>
          </div>
          <div class="modal-actions" style="margin-top:0.75rem;">
            <button class="btn" @click="showCompleteModal = false" style="border:1px solid var(--border-subtle);border-radius:6px;font-size:0.7rem;background:var(--bg-dark);color:#888;cursor:pointer;">Cancelar</button>
            <button class="btn" @click="completeTask()" :disabled="!completeTaskDesc.trim()" style="border:1px solid #2ecc7140;border-radius:6px;font-size:0.7rem;background:#2ecc7110;color:#2ecc71;cursor:pointer;">Marcar completa</button>
          </div>
        </div>
      </div>
      <!-- EVIDENCE MODAL -->
      <div class="modal-overlay" x-show="showEvidenceModal" @click.self="showEvidenceModal = false">
        <div class="modal" style="max-width:480px;">
          <template x-if="evidenceTask">
            <div>
              <h3>
                <iconify-icon icon="lucide:clipboard-check" style="width:16px;height:16px;color:#2ecc71;margin-right:6px;"></iconify-icon>
                Evidencia
              </h3>
              <div class="det-field" style="margin-bottom:0.5rem;">
                <span class="det-label" style="font-size:0.65rem;">Tarea</span>
                <span class="det-value" x-text="evidenceTask.titulo" style="font-size:0.78rem;color:#e0e0e0;"></span>
              </div>
              <div class="det-field" style="margin-bottom:0.5rem;">
                <span class="det-label" style="font-size:0.65rem;">Completada</span>
                <span class="det-value" x-text="formatDate(evidenceTask.completed_at)" style="font-size:0.72rem;color:#2ecc71;"></span>
              </div>
              <div class="det-field" style="margin-bottom:0.75rem;">
                <span class="det-label" style="font-size:0.65rem;">Severidad</span>
                <span class="tsk-badge" :class="taskSeverityClass(evidenceTask.criticidad)" x-text="taskSeverityLabel(evidenceTask.criticidad)"></span>
              </div>
              <div x-show="taskEvidenceDesc(evidenceTask.id)">
                <div style="font-size:0.72rem;color:#888;margin-bottom:0.4rem;">Notas / evidencia:</div>
                <div style="background:rgba(0,0,0,0.15);border:1px solid var(--border-subtle);border-radius:8px;padding:0.6rem;font-size:0.75rem;color:#ccc;line-height:1.5;white-space:pre-wrap;">
                  <span x-text="taskEvidenceDesc(evidenceTask.id)"></span>
                </div>
              </div>
              <div x-show="!taskEvidenceDesc(evidenceTask.id)" style="color:#555;font-size:0.7rem;padding:0.5rem 0;">
                Sin notas adicionales
              </div>
              <div class="modal-actions" style="margin-top:1rem;">
                <button class="btn" @click="showEvidenceModal = false" style="border:1px solid var(--border-subtle);border-radius:6px;font-size:0.7rem;background:var(--bg-dark);color:#888;cursor:pointer;">Cerrar</button>
                <button class="btn" @click="reopenTask(evidenceTask)" x-show="canEdit" style="border:1px solid #f39c1240;border-radius:6px;font-size:0.7rem;background:#f39c1210;color:#f39c12;cursor:pointer;">
                  <iconify-icon icon="lucide:rotate-ccw" style="width:11px;height:11px;margin-right:3px;"></iconify-icon>
                  Reabrir tarea
                </button>
              </div>
            </div>
          </template>
        </div>
      </div>

    </div>
  </template>
</div>
<script src="js/supabase.js"></script>
<script src="js/toast.js"></script>
<script src="js/audit.js"></script>
<script src="js/detail-server.js"></script>

<!-- Toast container -->
<div x-data x-show="$store.toast.items.length" class="toast-container">
  <template x-for="t in $store.toast.items" :key="t.id">
    <div class="toast" :class="t.type">
      <iconify-icon icon="lucide:check-circle" x-show="t.type==='success'" style="width:16px;height:16px;color:#2ecc71;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:alert-circle" x-show="t.type==='error'" style="width:16px;height:16px;color:#e74c3c;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:info" x-show="t.type==='info'" style="width:16px;height:16px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
      <span x-text="t.message"></span>
    </div>
  </template>
</div>
</body>
</html>
