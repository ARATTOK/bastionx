<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body>

<div x-data="app()" x-init="init()">
  <div class="login-screen">
    <template x-if="loading">
      <div class="login-card" style="text-align:center;padding:3rem 2rem;">
        <span class="spinner" style="display:inline-block;width:28px;height:28px;border:3px solid rgba(255,255,255,0.15);border-top-color:#6c5ce7;border-radius:50%;animation:spin .6s linear infinite;margin-bottom:1rem;"></span>
        <div style="font-size:0.85rem;color:#aaa;font-weight:500;">Verificando sesión...</div>
      </div>
    </template>

    <template x-if="!loading">
      <div class="login-card">
        <div class="login-header">
          <iconify-icon icon="lucide:server" class="login-logo" style="color:#6c5ce7;filter:drop-shadow(0 0 8px rgba(108,92,231,0.4));"></iconify-icon>
          <h1>BASTIONX LAB</h1>
          <p class="l-sub">
            Sistema de Control de Inventario e Infraestructura
          </p>
        </div>

        <form @submit.prevent="login()">
          <div class="field">
            <iconify-icon icon="lucide:mail" class="field-icon"></iconify-icon>
            <input type="email" x-model="loginEmail" @input="loginError=''" placeholder="tu.correo@bastionx.com" required autocomplete="email">
          </div>

          <div class="field" style="position:relative;">
            <iconify-icon icon="lucide:lock" class="field-icon"></iconify-icon>
            <input :type="showPassword ? 'text' : 'password'" x-model="loginPassword" @input="loginError=''" placeholder="Contraseña" required autocomplete="current-password" style="padding-right:2.4rem !important;">
            <button type="button" @click="showPassword = !showPassword" title="Mostrar/ocultar contraseña" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#888;cursor:pointer;padding:4px;display:inline-flex;align-items:center;justify-content:center;">
              <iconify-icon :icon="showPassword ? 'lucide:eye-off' : 'lucide:eye'" style="width:16px;height:16px;"></iconify-icon>
            </button>
          </div>

          <button type="submit" class="login-btn" :disabled="authenticating">
            <span class="spinner" x-show="authenticating"></span>
            <span x-text="authenticating ? 'Autenticando...' : 'Ingresar al sistema'"></span>
          </button>

          <div class="msg error" x-show="loginError">
            <iconify-icon icon="lucide:triangle-alert" class="msg-icon"></iconify-icon>
            <span x-text="loginError"></span>
          </div>
        </form>

        <div class="login-footer">
          BASTIONX LAB &mdash; Inventory & Infrastructure Management
        </div>
      </div>
    </template>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/toast.js"></script>
<script src="js/login.js"></script>

<!-- Toast container -->
<div x-data x-show="$store.toast.items.length" class="toast-container">
  <template x-for="t in $store.toast.items" :key="t.id">
    <div class="toast" :class="t.type">
      <iconify-icon icon="lucide:check-circle" x-show="t.type==='success'" style="width:16px;height:16px;color:#2ecc71;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:alert-circle" x-show="t.type==='error'" style="width:16px;height:16px;color:#e74c3c;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:info" x-show="t.type==='info'" style="width:16px;height:16px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
      <span x-text="t.message"></span>
    </div>
  </template>
</div>
</body>
</html>
