<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body>

<div x-data="app()" x-init="init()">
  <div class="login-screen">
    <template x-if="loading">
      <div class="login-card" style="text-align:center;">
        <div style="padding:3rem 0;">
          <span class="spinner" style="display:inline-block;width:24px;height:24px;border:2px solid rgba(255,255,255,0.15);border-top-color:#6c5ce7;border-radius:50%;animation:spin .6s linear infinite;margin-bottom:1rem;"></span>
          <div style="font-size:0.8rem;color:#555;">Verificando sesión...</div>
        </div>
      </div>
    </template>
    <template x-if="!loading">
      <div class="login-card">
        <div class="login-header">
          <iconify-icon icon="lucide:server" class="login-logo"></iconify-icon>
          <h1>BASTIONX LAB</h1>
          <p class="l-sub">
            Acceso restringido &mdash;
            solo <span class="l-domain">@bastionx.com</span>
          </p>
        </div>

        <form @submit.prevent="login()">
          <div class="field">
            <iconify-icon icon="lucide:mail" class="field-icon"></iconify-icon>
            <input type="email" x-model="loginEmail" placeholder="tu@correo.com" required autocomplete="email">
          </div>
          <div class="field">
            <iconify-icon icon="lucide:lock" class="field-icon"></iconify-icon>
            <input type="password" x-model="loginPassword" placeholder="Contrase&ntilde;a" required autocomplete="current-password">
          </div>

          <button type="submit" class="login-btn" :disabled="loading">
            <template x-if="loading">
              <span class="spinner"></span>
            </template>
            <span x-text="loading ? 'Ingresando...' : 'Ingresar al panel'"></span>
          </button>

          <div class="msg error" x-show="loginError">
            <iconify-icon icon="lucide:x-circle" class="msg-icon"></iconify-icon>
            <span x-text="loginError"></span>
          </div>
        </form>

        <div class="login-footer">
          Bastion Lab &mdash; Inventory Control
        </div>
      </div>
    </template>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/toast.js"></script>
<script src="js/login.js"></script>

<!-- Toast container -->
<div x-data x-show="$store.toast.items.length" class="toast-container">
  <template x-for="t in $store.toast.items" :key="t.id">
    <div class="toast" :class="t.type">
      <iconify-icon icon="lucide:check-circle" x-show="t.type==='success'" style="width:16px;height:16px;color:#2ecc71;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:alert-circle" x-show="t.type==='error'" style="width:16px;height:16px;color:#e74c3c;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:info" x-show="t.type==='info'" style="width:16px;height:16px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
      <span x-text="t.message"></span>
    </div>
  </template>
</div>
</body>
</html>
