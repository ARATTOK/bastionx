<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Login</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="/manifest.json">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.338.0/font/Lucide.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div x-data="app()" x-init="init()">
  <div class="login-screen">
    <template x-if="loading">
      <div class="login-card" style="text-align:center;">
        <div style="padding:3rem 0;">
          <span class="spinner" style="display:inline-block;width:24px;height:24px;border:2px solid rgba(255,255,255,0.15);border-top-color:#6c5ce7;border-radius:50%;animation:spin .6s linear infinite;margin-bottom:1rem;"></span>
          <div style="font-size:0.8rem;color:#555;">Verificando sesión...</div>
        </div>
      </div>
    </template>
    <template x-if="!loading">
      <div class="login-card">
        <div class="login-header">
          <svg class="login-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
            <line x1="6" y1="6" x2="6.01" y2="6"/>
            <line x1="6" y1="18" x2="6.01" y2="18"/>
            <rect x="9" y="2" width="6" height="8" rx="1"/>
            <rect x="9" y="14" width="6" height="8" rx="1"/>
          </svg>
          <h1>BASTIONX LAB</h1>
          <p class="l-sub">
            Acceso restringido &mdash;
            solo <span class="l-domain">@bastionx.com</span>
          </p>
        </div>

        <form @submit.prevent="login()">
          <div class="field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" x-model="loginEmail" placeholder="tu@correo.com" required autocomplete="email">
          </div>
          <div class="field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" x-model="loginPassword" placeholder="Contrase&ntilde;a" required autocomplete="current-password">
          </div>

          <button type="submit" class="login-btn" :disabled="loading">
            <template x-if="loading">
              <span class="spinner"></span>
            </template>
            <span x-text="loading ? 'Ingresando...' : 'Ingresar al panel'"></span>
          </button>

          <div class="msg error" x-show="loginError">
            <svg class="msg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <span x-text="loginError"></span>
          </div>
        </form>

        <div class="login-footer">
          Bastion Lab &mdash; Inventory Control
        </div>
      </div>
    </template>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/login.js"></script>
</body>
</html>
