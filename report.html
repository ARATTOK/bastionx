<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Reporte</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/supabase.js"></script>
  <script defer src="js/toast.js"></script>
  <script defer src="js/report.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .report-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #333;
    }
    .report-header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .report-header .report-date {
      font-size: 0.75rem;
      color: #888;
    }
    .report-header .report-actions {
      display: flex;
      gap: 0.5rem;
    }
    .report-header .report-actions button,
    .report-header .report-actions a {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      font-size: 0.72rem;
      cursor: pointer;
      color: #ccc;
      text-decoration: none;
    }
    .report-header .report-actions button:hover,
    .report-header .report-actions a:hover {
      background: rgba(255,255,255,0.06);
    }

    .report-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .report-stat {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      text-align: center;
    }
    .report-stat .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }
    .report-stat .stat-label {
      font-size: 0.7rem;
      color: #888;
      margin-top: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .report-table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1a1a1a;
    }
    .report-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.72rem;
    }
    .report-table th {
      background: #252525;
      color: #aaa;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.65rem 0.65rem;
      text-align: left;
      border-bottom: 1px solid #333;
      white-space: nowrap;
    }
    .report-table td {
      padding: 0.55rem 0.65rem;
      border-bottom: 1px solid #2a2a2a;
      color: #ccc;
      vertical-align: middle;
    }
    .report-table tr:last-child td {
      border-bottom: none;
    }
    .report-table tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .report-table .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 0.35rem;
      vertical-align: middle;
    }
    .report-table .status-dot.activo { background: #2ecc71; }
    .report-table .status-dot.inactivo { background: #e74c3c; }
    .report-table .status-dot.pendiente { background: #f39c12; }
    .report-table .status-dot.libre { background: #888; }

    .report-charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 700px) {
      .report-charts { grid-template-columns: 1fr; }
    }
    .chart-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-subtle,#333);
      border-radius: 12px;
      padding: 1rem;
    }
    .chart-title {
      font-size: 0.75rem;
      color: #999;
      margin: 0 0 0.75rem;
      font-weight: 600;
    }
    .chart-body {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .chart-legend {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      color: #ccc;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-count {
      margin-left: auto;
      color: #888;
      font-weight: 600;
    }
    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      width: 100%;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .bar-label {
      flex: 0 0 80px;
      font-size: 0.65rem;
      color: #aaa;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bar-track {
      flex: 1;
      height: 18px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6c5ce7, #a29bfe);
      border-radius: 4px;
      transition: width 0.3s;
    }
    .bar-value {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.6rem;
      color: #fff;
      font-weight: 600;
    }

    .report-footer {
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: #666;
      text-align: center;
      padding-top: 1rem;
      border-top: 1px solid #2a2a2a;
    }

      @media print {
        body {
          background: #fff !important;
        }
        .report-charts {
          break-inside: avoid;
        }
        .chart-card {
          background: #fafafa !important;
          border-color: #ddd !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
      .report-page {
        padding: 0.5in !important;
      }
      .report-header {
        border-bottom-color: #ccc !important;
      }
      .report-header h1 {
        color: #000 !important;
      }
      .report-header .report-date {
        color: #666 !important;
      }
      .report-header .report-actions {
        display: none !important;
      }
      .report-stat {
        background: #f5f5f5 !important;
        border-color: #ddd !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .report-stat .stat-value {
        color: #000 !important;
      }
      .report-stat .stat-label {
        color: #666 !important;
      }
      .report-table-wrap {
        border-color: #ddd !important;
        background: #fff !important;
      }
      .report-table th {
        background: #eee !important;
        color: #333 !important;
        border-bottom-color: #ccc !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .report-table td {
        color: #333 !important;
        border-bottom-color: #eee !important;
      }
      .report-table tr:hover td {
        background: none !important;
      }
      .report-footer {
        color: #999 !important;
        border-top-color: #eee !important;
      }
      .report-table .status-dot {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }

    @media (max-width: 600px) {
      .report-stats {
        grid-template-columns: repeat(2, 1fr);
      }
      .report-header {
        flex-direction: column;
        gap: 0.75rem;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
<div x-data="reportApp()" x-init="init()">
  <div class="loading-state" x-show="loading" style="padding:3rem;text-align:center;">
    <iconify-icon icon="lucide:loader" style="width:18px;height:18px;color:#6c5ce7;animation:spin 1s linear infinite;"></iconify-icon>
    Generando reporte...
  </div>

  <div x-show="!loading" class="report-page">
    <!-- HEADER -->
    <div class="report-header">
      <div>
        <h1>
          <iconify-icon icon="lucide:clipboard-list" style="width:22px;height:22px;color:#6c5ce7;"></iconify-icon>
          BASTIONX LAB — Reporte de Inventario
        </h1>
        <div class="report-date" x-text="'Generado: ' + reportDate"></div>
      </div>
      <div class="report-actions">
        <button @click="exportCSV()" title="Descargar inventario en CSV">
          <iconify-icon icon="lucide:file-down" style="width:13px;height:13px;"></iconify-icon>
          Exportar CSV
        </button>
        <button @click="print()" title="Imprimir o guardar como PDF">
          <iconify-icon icon="lucide:printer" style="width:13px;height:13px;"></iconify-icon>
          Imprimir / PDF
        </button>
        <a href="dashboard.html" @click.prevent="window.location.href='dashboard.html'">
          <iconify-icon icon="lucide:arrow-left" style="width:13px;height:13px;"></iconify-icon>
          Volver
        </a>
      </div>
    </div>

    <!-- STATS -->
    <div class="report-stats">
      <div class="report-stat">
        <div class="stat-value" x-text="servers.length"></div>
        <div class="stat-label">Servidores</div>
      </div>
      <div class="report-stat">
        <div class="stat-value" x-text="totalRAM + ' GB'"></div>
        <div class="stat-label">RAM Total</div>
      </div>
      <div class="report-stat">
        <div class="stat-value" x-text="totalStorageTB + ' TB'"></div>
        <div class="stat-label">Discos</div>
      </div>
      <div class="report-stat">
        <div class="stat-value" x-text="totalCpuGHz + ' GHz'"></div>
        <div class="stat-label">CPU Total</div>
      </div>
    </div>

    <!-- CHARTS -->
    <div class="report-charts">
      <!-- Status Pie -->
      <div class="chart-card">
        <h3 class="chart-title">Servidores por estado</h3>
        <div class="chart-body">
          <svg viewBox="0 0 42 42" width="160" height="160" style="transform:rotate(-90deg);">
            <circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#2a2a2a" stroke-width="3"/>
            <template x-for="(seg, i) in statusData" :key="seg.label">
              <circle cx="21" cy="21" r="15.915" fill="transparent"
                :stroke="['#2ecc71','#e74c3c','#f39c12','#777'][i]"
                stroke-width="3"
                :stroke-dasharray="(seg.count / servers.length * 100) + ' ' + (100 - seg.count / servers.length * 100)"
                :stroke-dashoffset="statusData.slice(0,i).reduce((a,s) => a - (s.count / servers.length * 100), 25)"/>
            </template>
          </svg>
          <div class="chart-legend">
            <template x-for="seg in statusData" :key="seg.label">
              <div class="legend-item">
                <span class="legend-dot" :style="'background:' + ['#2ecc71','#e74c3c','#f39c12','#777'][['Activo','Inactivo','Pendiente','Libre'].indexOf(seg.label)]"></span>
                <span class="legend-label" x-text="seg.label"></span>
                <span class="legend-count" x-text="seg.count"></span>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Location Bar -->
      <div class="chart-card">
        <h3 class="chart-title">Servidores por ubicación</h3>
        <div class="chart-body">
          <div class="bar-chart">
            <template x-for="loc in locationData" :key="loc.label">
              <div class="bar-row">
                <span class="bar-label" x-text="loc.label"></span>
                <div class="bar-track">
                  <div class="bar-fill" :style="'width:' + (loc.count / Math.max(...locationData.map(l => l.count)) * 100) + '%'"></div>
                  <span class="bar-value" x-text="loc.count"></span>
                </div>
              </div>
            </template>
            <div class="bar-row" x-show="locationData.length === 0">
              <span class="bar-label" style="color:#555;">Sin datos</span>
            </div>
          </div>
        </div>
      </div>
      <!-- Disk Type Pie -->
      <div class="chart-card">
        <h3 class="chart-title">Discos por tipo</h3>
        <div class="chart-body">
          <svg viewBox="0 0 42 42" width="160" height="160" style="transform:rotate(-90deg);">
            <circle cx="21" cy="21" r="15.915" fill="transparent" stroke="#2a2a2a" stroke-width="3"/>
            <template x-for="(seg, i) in diskTypeData" :key="seg.label">
              <circle cx="21" cy="21" r="15.915" fill="transparent"
                :stroke="['#3498db','#e74c3c','#9b59b6','#777'][i]"
                stroke-width="3"
                :stroke-dasharray="(seg.count / diskTypeData.reduce((a,s) => a + s.count, 0) * 100) + ' ' + (100 - seg.count / diskTypeData.reduce((a,s) => a + s.count, 0) * 100)"
                :stroke-dashoffset="diskTypeData.slice(0,i).reduce((a,s) => a - (s.count / diskTypeData.reduce((a2,s2) => a2 + s2.count, 0) * 100), 25)"/>
            </template>
          </svg>
          <div class="chart-legend">
            <template x-for="seg in diskTypeData" :key="seg.label">
              <div class="legend-item">
                <span class="legend-dot" :style="'background:' + ['#3498db','#e74c3c','#9b59b6','#777'][['SSD','HDD','NVMe','Otro'].indexOf(seg.label)]"></span>
                <span class="legend-label" x-text="seg.label"></span>
                <span class="legend-count" x-text="seg.count"></span>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Services Overview -->
      <div class="chart-card" style="grid-column:1/-1;">
        <h3 class="chart-title">Servicios registrados</h3>
        <div class="chart-body" style="flex-direction:column;">
          <template x-if="serviceOverview.length > 0">
            <table class="report-table" style="font-size:0.7rem;">
              <thead>
                <tr>
                  <th>Servicio</th>
                  <th>Servidores</th>
                  <th>Nombres</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="svc in serviceOverview" :key="svc.nombre">
                  <tr>
                    <td style="font-weight:600;color:#e0e0e0;" x-text="svc.nombre"></td>
                    <td x-text="svc.count"></td>
                    <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;color:#888;" x-text="svc.servers.join(', ')"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </template>
          <div x-show="serviceOverview.length === 0" style="color:#555;font-size:0.75rem;padding:1rem 0;text-align:center;">Sin servicios registrados</div>
        </div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="report-table-wrap">
      <table class="report-table">
        <thead>
          <tr>
            <th>Hostname</th>
            <th>SN</th>
            <th>Modelo</th>
            <th>Ubicación</th>
            <th>Estado</th>
            <th>CPU</th>
            <th>RAM</th>
            <th>Discos</th>
            <th x-show="canEdit">IPMI</th>
            <th>Tags</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="s in servers" :key="s.id">
            <tr>
              <td style="font-weight:600;color:#e0e0e0;" x-text="s.hostname"></td>
              <td x-text="s.sn || '—'"></td>
              <td x-text="s.modelo || '—'"></td>
              <td x-text="s.ubicacion || '—'"></td>
              <td>
                <span class="status-dot" :class="s.estado || 'libre'"></span>
                <span x-text="s.estado ? s.estado.charAt(0).toUpperCase() + s.estado.slice(1) : 'Libre'"></span>
              </td>
              <td x-text="s.procesador || '—'"></td>
              <td x-text="s.ram_gb ? s.ram_gb + ' GB' : '—'"></td>
              <td x-text="diskCount(s)"></td>
              <td x-text="credField(s, 'ipmi')" x-show="canEdit"></td>
              <td x-text="serverTags(s)" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- FOOTER -->
    <div class="report-footer">
      <span x-text="'Generado el ' + reportDate + ' — ' + servers.length + ' servidores en total'"></span>
    </div>
  </div>
</div>

<!-- Toast container -->
<div x-data x-show="$store.toast.items.length" class="toast-container">
  <template x-for="t in $store.toast.items" :key="t.id">
    <div class="toast" :class="t.type">
      <iconify-icon icon="lucide:check-circle" x-show="t.type==='success'" style="width:16px;height:16px;color:#2ecc71;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:alert-circle" x-show="t.type==='error'" style="width:16px;height:16px;color:#e74c3c;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:info" x-show="t.type==='info'" style="width:16px;height:16px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
      <span x-text="t.message"></span>
    </div>
  </template>
</div>
</body>
</html>
