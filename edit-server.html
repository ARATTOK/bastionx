<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Editar</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div x-data="editApp()" x-init="init()">
  <div class="loading-state" x-show="loading">Cargando...</div>

  <template x-if="server">
    <div class="container" style="max-width:800px;padding:2rem 1rem;">
      <div class="topbar" style="margin-bottom:1.5rem;">
        <div style="display:flex;align-items:center;gap:0.75rem;">
          <button class="btn" @click="goBack()" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.7rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.7rem;background:#12121a;color:#888;cursor:pointer;">
            <iconify-icon icon="lucide:arrow-left" style="width:11px;height:11px;"></iconify-icon>
            Cancelar
          </button>
          <h1 style="font-size:1.2rem;font-weight:700;color:#fff;margin:0;">
            <iconify-icon icon="lucide:pencil" style="width:16px;height:16px;color:#6c5ce7;margin-right:6px;"></iconify-icon>
            Editar: <span x-text="server.hostname" style="color:#888;font-weight:400;"></span>
          </h1>
        </div>
        <button class="btn" @click="save()" :disabled="saving" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.8rem;border:1px solid #6c5ce7;border-radius:8px;font-size:0.7rem;background:#6c5ce7;color:#fff;cursor:pointer;">
          <iconify-icon icon="lucide:save" style="width:12px;height:12px;"></iconify-icon>
          <span x-text="saving ? 'Guardando...' : 'Guardar'"></span>
        </button>
      </div>

      <!-- ESTADO -->
      <div class="edit-section">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:clock" style="width:14px;height:14px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
          Estado
        </h2>
        <select x-model="form.estado" style="max-width:200px;">
          <option value="Activo">Activo</option>
          <option value="Inactivo">Inactivo</option>
          <option value="Pendiente">Pendiente</option>
          <option value="Libre">Libre</option>
        </select>
      </div>

      <!-- GENERAL -->
      <div class="edit-section">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:monitor" style="width:14px;height:14px;color:#3498db;flex-shrink:0;"></iconify-icon>
          Información general
        </h2>
        <div class="edit-grid">
          <div class="edit-field"><label>Hostname *</label><input type="text" x-model="form.hostname" required></div>
          <div class="edit-field"><label>Modelo</label><input type="text" x-model="form.modelo"></div>
          <div class="edit-field"><label>Serial Number</label><input type="text" x-model="form.sn"></div>
          <div class="edit-field"><label>Ubicación</label><input type="text" x-model="form.ubicacion" placeholder="Ej: U34"></div>
          <div class="edit-field"><label>Procesador</label><input type="text" x-model="form.procesador"></div>
          <div class="edit-field"><label>RAM (GB)</label><input type="number" x-model="form.ram_gb"></div>
          <div class="edit-field"><label>Módulos RAM</label><input type="text" x-model="form.ram_modulos" placeholder="Ej: 8"></div>
          <div class="edit-field"><label>Velocidad RAM</label><input type="text" x-model="form.ram_velocidad" placeholder="Ej: 2666 MHz"></div>
        </div>
      </div>

      <!-- DISCOS -->
      <div class="edit-section">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:hard-drive" style="width:14px;height:14px;color:#1abc9c;flex-shrink:0;"></iconify-icon>
          RAIDs y discos
        </h2>
        <template x-for="(raid, ri) in form.raids" :key="ri">
          <div class="svc-edit-block">
            <div class="svc-edit-header">
              <strong style="font-size:0.75rem;color:#aaa;" x-text="'RAID #' + (ri+1)"></strong>
              <button class="btn-icon danger" @click="removeRaid(ri)" title="Eliminar RAID">
                <iconify-icon icon="lucide:x" style="width:12px;height:12px;"></iconify-icon>
              </button>
            </div>
            <div class="edit-field" style="margin-bottom:0.5rem;">
              <label>Nombre del RAID</label>
              <input type="text" x-model="raid.nombre" placeholder="Ej: RAID 1, RAID 5, JBOD" style="max-width:300px;">
            </div>
            <template x-for="(d, di) in raid.discos" :key="di">
              <div style="padding:0.4rem 0;border-top:1px solid rgba(255,255,255,0.03);">
                <div style="display:flex;align-items:center;gap:0.3rem;margin-bottom:0.3rem;">
                  <span style="font-size:0.6rem;color:#555;text-transform:uppercase;" x-text="'Disco #' + (di+1)"></span>
                  <button class="btn-icon danger" @click="removeDiskFromRaid(ri, di)" title="Eliminar disco" style="margin-left:auto;">
                    <iconify-icon icon="lucide:x" style="width:10px;height:10px;"></iconify-icon>
                  </button>
                </div>
                <div class="edit-grid">
                  <div class="edit-field"><label>Bahía *</label><input type="text" x-model="d.bay" placeholder="Ej: Bay 0"></div>
                  <div class="edit-field"><label>Tipo</label><input type="text" x-model="d.tipo" placeholder="Ej: SSD, HDD"></div>
                  <div class="edit-field"><label>Tamaño</label><input type="text" x-model="d.tamano" placeholder="Ej: 480GB, 2TB"></div>
                  <div class="edit-field"><label>Velocidad</label><input type="text" x-model="d.velocidad" placeholder="Ej: 6Gbps, SAS 12Gbps"></div>
                </div>
              </div>
            </template>
            <button class="btn" @click="addDiskToRaid(ri)" style="margin-top:0.4rem;padding:0.2rem 0.5rem;font-size:0.6rem;border:1px dashed var(--border-subtle);border-radius:6px;background:transparent;color:#555;cursor:pointer;">
              + Agregar disco a este RAID
            </button>
          </div>
        </template>
        <button class="btn" @click="addRaid()" style="margin-top:0.5rem;padding:0.35rem 0.7rem;font-size:0.7rem;border:1px dashed var(--border-subtle);border-radius:8px;background:transparent;color:#6c5ce7;cursor:pointer;">
          + Agregar RAID
        </button>
      </div>

      <!-- TAGS -->
      <div class="edit-section">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:tag" style="width:14px;height:14px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
          Tags
        </h2>
        <div class="tags-selector" x-show="allTags.length > 0">
          <template x-for="t in allTags" :key="t.id">
            <button class="tag-select-btn" :class="selectedTagIds.includes(t.id) ? 'selected' : ''" @click="toggleTag(t.id)" :style="selectedTagIds.includes(t.id) ? 'background:' + t.color + '20;border-color:' + t.color + '60;color:' + t.color + ';' : ''">
              <span class="tag-dot" :style="'background:' + t.color + ';'"></span>
              <span x-text="t.name"></span>
               <iconify-icon icon="lucide:check" style="width:11px;height:11px;margin-left:auto;" x-show="selectedTagIds.includes(t.id)"></iconify-icon>
            </button>
          </template>
        </div>
        <div x-show="allTags.length === 0" style="color:#555;font-size:0.7rem;">No hay tags. Créalos desde <a href="tags.html" style="color:#6c5ce7;">tags.html</a></div>
      </div>

      <!-- SERVICIOS -->
      <div class="edit-section">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:globe" style="width:14px;height:14px;color:#f39c12;flex-shrink:0;"></iconify-icon>
          Servicios
        </h2>
        <template x-for="(svc, i) in form.servicios" :key="i">
          <div class="svc-edit-block">
            <div class="svc-edit-header">
              <strong style="font-size:0.75rem;color:#aaa;" x-text="'Servicio #' + (i+1)"></strong>
              <button class="btn-icon danger" @click="removeService(i)" title="Eliminar servicio">
                <iconify-icon icon="lucide:x" style="width:12px;height:12px;"></iconify-icon>
              </button>
            </div>
            <div class="edit-grid">
              <div class="edit-field"><label>Nombre del servicio *</label><input type="text" x-model="svc.nombre" placeholder="Ej: PostgreSQL"></div>
              <div class="edit-field"><label>Puerto</label><input type="text" x-model="svc.puerto" placeholder="Ej: 5432"></div>
            </div>
            <div class="edit-field"><label>Descripción</label><input type="text" x-model="svc.descripcion" placeholder="Ej: Base de datos principal"></div>
            <div class="edit-field">
              <label>IPs / Rangos</label>
              <template x-for="(ip, j) in svc.ips" :key="j">
                <div class="ip-row">
                  <input type="text" x-model="svc.ips[j]" placeholder="Ej: 10.0.0.1 o 10.0.0.1-10.0.0.5" style="font-family:monospace;font-size:0.7rem;">
                  <button class="btn-icon" @click="removeServiceIp(i, j)" title="Quitar IP">
                    <iconify-icon icon="lucide:x" style="width:11px;height:11px;"></iconify-icon>
                  </button>
                </div>
              </template>
              <button class="btn" @click="addServiceIp(i)" style="margin-top:0.3rem;padding:0.2rem 0.5rem;font-size:0.6rem;border:1px dashed var(--border-subtle);border-radius:6px;background:transparent;color:#555;cursor:pointer;">
                + Agregar IP / rango
              </button>
            </div>
          </div>
        </template>
        <button class="btn" @click="addService()" style="margin-top:0.5rem;padding:0.35rem 0.7rem;font-size:0.7rem;border:1px dashed var(--border-subtle);border-radius:8px;background:transparent;color:#6c5ce7;cursor:pointer;">
          + Agregar servicio
        </button>
      </div>

      <!-- CREDENCIALES (solo super admin) -->
      <div class="edit-section" x-show="canEdit">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:lock" style="width:14px;height:14px;color:#e74c3c;flex-shrink:0;"></iconify-icon>
          Credenciales <span style="color:#6c5ce7;font-size:0.6rem;font-weight:400;">(admin)</span>
        </h2>
        <div class="edit-grid">
          <div class="edit-field"><label>IPMI</label><input type="text" x-model="credForm.ipmi" style="font-family:monospace;font-size:0.7rem;"></div>
          <div class="edit-field"><label>IP Servicio</label><input type="text" x-model="credForm.ip_servicio" style="font-family:monospace;font-size:0.7rem;"></div>
          <div class="edit-field"><label>Usuario</label><input type="text" x-model="credForm.usuario" style="font-family:monospace;font-size:0.7rem;"></div>
          <div class="edit-field"><label>Password</label><input type="text" x-model="credForm.password" style="font-family:monospace;font-size:0.7rem;"></div>
        </div>
      </div>

      <div style="margin-top:2rem;display:flex;gap:0.5rem;justify-content:flex-end;">
        <button class="btn" @click="goBack()" style="padding:0.4rem 0.8rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.75rem;background:#12121a;color:#888;cursor:pointer;">Cancelar</button>
        <button class="btn" @click="save()" :disabled="saving" style="padding:0.4rem 0.8rem;border:1px solid #6c5ce7;border-radius:8px;font-size:0.75rem;background:#6c5ce7;color:#fff;cursor:pointer;">
          <span x-text="saving ? 'Guardando...' : 'Guardar cambios'"></span>
        </button>
      </div>
    </div>
  </template>
</div>
<script src="js/supabase.js"></script>
<script src="js/edit-server.js"></script>
</body>
</html>
