<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Editar</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body>
<div x-data="editApp()" x-init="init()">
  <div class="loading-state" x-show="loading">
    <iconify-icon icon="lucide:loader" style="width:18px;height:18px;color:#6c5ce7;animation:spin 1s linear infinite;"></iconify-icon>
    Cargando...
  </div>

  <template x-if="server">
    <div class="container" style="max-width:960px;padding:2rem 1rem;">
      <!-- BREADCRUMBS -->
      <nav aria-label="Breadcrumb" class="breadcrumbs">
        <a href="dashboard.html">Dashboard</a>
        <iconify-icon icon="lucide:chevron-right" class="bc-sep"></iconify-icon>
        <a :href="'server-detail.html?id=' + server.id" x-text="server.hostname"></a>
        <iconify-icon icon="lucide:chevron-right" class="bc-sep"></iconify-icon>
        <span aria-current="page">Editar</span>
      </nav>

      <div class="topbar" style="margin-bottom:1.5rem;">
        <div style="display:flex;align-items:center;gap:0.75rem;">
          <button class="btn" @click="goBack()" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.7rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.7rem;background:#12121a;color:#888;cursor:pointer;">
            <iconify-icon icon="lucide:arrow-left" style="width:11px;height:11px;"></iconify-icon>
            Cancelar
          </button>
          <h1 style="font-size:1.2rem;font-weight:700;color:#fff;margin:0;">
            <iconify-icon icon="lucide:pencil" style="width:16px;height:16px;color:#6c5ce7;margin-right:6px;"></iconify-icon>
            Editar: <span x-text="server.hostname" style="color:#888;font-weight:400;"></span>
          </h1>
        </div>
        <button class="btn" @click="save()" :disabled="saving" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.8rem;border:1px solid #6c5ce7;border-radius:8px;font-size:0.7rem;background:#6c5ce7;color:#fff;cursor:pointer;">
          <iconify-icon icon="lucide:save" style="width:12px;height:12px;"></iconify-icon>
          <span x-text="saving ? 'Guardando...' : 'Guardar'"></span>
        </button>
      </div>

      <!-- ESTADO -->
      <div class="edit-section">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:clock" style="width:14px;height:14px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
          Estado
        </h2>
        <select x-model="form.estado" style="max-width:200px;">
          <option value="Activo">Activo</option>
          <option value="Inactivo">Inactivo</option>
          <option value="Pendiente">Pendiente</option>
          <option value="Libre">Libre</option>
        </select>
      </div>

      <!-- GENERAL -->
      <div class="edit-section">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:monitor" style="width:14px;height:14px;color:#3498db;flex-shrink:0;"></iconify-icon>
          Informaci&oacute;n general
        </h2>
        <div class="edit-grid">
          <div class="field-group">
            <label for="edit-hostname">Hostname *</label>
            <input id="edit-hostname" type="text" x-model="form.hostname" required @blur="validateField('hostname')" :class="errors.hostname ? 'is-invalid' : ''">
            <div class="field-error" :class="errors.hostname ? 'show' : ''" x-text="errors.hostname"></div>
          </div>
          <div class="field-group"><label>Modelo</label><input type="text" x-model="form.modelo"></div>
          <div class="field-group">
            <label>Serial Number *</label>
            <input type="text" x-model="form.sn" @blur="validateField('sn')" :class="errors.sn ? 'is-invalid' : ''">
            <div class="field-error" :class="errors.sn ? 'show' : ''" x-text="errors.sn"></div>
          </div>
          <div class="field-group"><label>Ubicaci&oacute;n</label><input type="text" x-model="form.ubicacion" placeholder="Ej: U34"></div>
          <div class="field-group"><label>Procesador</label><input type="text" x-model="form.procesador"></div>
          <div class="field-group"><label>RAM (GB)</label><input type="number" x-model="form.ram_gb"></div>
          <div class="field-group"><label>M&oacute;dulos RAM</label><input type="text" x-model="form.ram_modulos" placeholder="Ej: 8"></div>
          <div class="field-group"><label>Velocidad RAM</label><input type="text" x-model="form.ram_velocidad" placeholder="Ej: 2666 MHz"></div>
        </div>
      </div>

      <!-- DISCOS -->
      <div class="edit-section">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:hard-drive" style="width:14px;height:14px;color:#1abc9c;flex-shrink:0;"></iconify-icon>
          RAIDs y discos
        </h2>

        <!-- RAID Preview Badge -->
        <div class="raid-preview" x-show="form.raids.some(r => r.discos.some(d => d.bay))" style="margin-bottom:1rem;background:rgba(26,188,156,0.06);border:1px solid rgba(26,188,156,0.2);border-radius:10px;padding:0.6rem 0.85rem;">
          <div style="font-size:0.62rem;color:#1abc9c;text-transform:uppercase;letter-spacing:0.04em;font-weight:700;margin-bottom:0.3rem;display:flex;align-items:center;gap:0.3rem;">
            <iconify-icon icon="lucide:layers" style="width:13px;height:13px;"></iconify-icon>
            Resumen de Almacenamiento Configurado
          </div>
          <template x-for="(raid, ri) in form.raids" :key="ri">
            <div x-show="raid.discos.some(d => d.bay)" style="font-size:0.72rem;color:#ccc;display:flex;align-items:center;gap:0.5rem;margin-top:0.25rem;">
              <span style="font-weight:600;color:#fff;" x-text="raid.nombre || 'RAID ' + (ri + 1)"></span>
              <span class="raid-badge-count" x-text="raid.discos.filter(d => d.bay).length + ' discos'"></span>
              <span style="color:#aaa;font-size:0.68rem;" x-text="raid.discos.filter(d => d.bay).map(d => (d.bay ? 'Bay ' + d.bay + ': ' : '') + (d.tamano || '?') + (d.tamano_unit || '') + ' ' + (d.tipo || '?')).join(' | ')"></span>
            </div>
          </template>
        </div>

        <template x-for="(raid, ri) in form.raids" :key="ri">
          <div class="raid-block">
            <div class="raid-header">
              <iconify-icon icon="lucide:layers" style="width:16px;height:16px;color:#1abc9c;flex-shrink:0;"></iconify-icon>
              <input type="text" x-model="raid.nombre" placeholder="Nombre del Grupo RAID (ej: RAID 1, Virtual Disk 0, Data Store)">
              <span class="raid-badge-count" x-text="raid.discos.filter(d => d.bay).length + ' unidades'"></span>
              <button class="btn-icon" @click="removeRaid(ri)" title="Eliminar este grupo RAID" style="color:#e74c3c;background:rgba(231,76,60,0.1);border-radius:6px;width:28px;height:28px;border:none;cursor:pointer;">
                <iconify-icon icon="lucide:trash-2" style="width:14px;height:14px;"></iconify-icon>
              </button>
            </div>

            <div class="raid-disks">
              <div class="disk-row-grid header">
                <span>Bahía #</span>
                <span>Tipo Disco</span>
                <span>Capacidad / Tamaño</span>
                <span>Velocidad</span>
                <span></span>
              </div>
              <template x-for="(disk, di) in raid.discos" :key="di">
                <div class="disk-row-grid" :class="diskErrors[ri + '-' + di] ? 'has-error' : ''">
                  <div class="disk-input-cell">
                    <input type="text" x-model="disk.bay" placeholder="0" @blur="validateDisk(ri, di)" @input="validateDisk(ri, di)" :class="diskErrors[ri + '-' + di]?.bay ? 'is-invalid' : ''">
                  </div>
                  <div class="disk-input-cell">
                    <select x-model="disk.tipo" @change="validateDisk(ri, di)" :class="diskErrors[ri + '-' + di]?.tipo ? 'is-invalid' : ''">
                      <option value="">Seleccionar</option>
                      <option value="SSD">SSD</option>
                      <option value="NVMe">NVMe</option>
                      <option value="HDD">HDD</option>
                      <option value="SAS">SAS</option>
                    </select>
                  </div>
                  <div class="disk-input-cell">
                    <div style="display:flex;gap:0.25rem;">
                      <input type="text" x-model="disk.tamano" placeholder="480" @blur="validateDisk(ri, di)" @input="validateDisk(ri, di)" style="flex:1;min-width:0;" :class="diskErrors[ri + '-' + di]?.tamano ? 'is-invalid' : ''">
                      <select x-model="disk.tamano_unit" style="width:65px !important;flex-shrink:0;">
                        <option value="GB">GB</option>
                        <option value="TB">TB</option>
                      </select>
                    </div>
                  </div>
                  <div class="disk-input-cell">
                    <select x-model="disk.velocidad">
                      <option value="">Auto</option>
                      <option value="12Gbps">12 Gbps</option>
                      <option value="6Gbps">6 Gbps</option>
                      <option value="3Gbps">3 Gbps</option>
                    </select>
                  </div>
                  <button class="btn-icon" @click="removeDiskFromRaid(ri, di)" title="Quitar disco" style="color:#888;background:transparent;border:none;cursor:pointer;">
                    <iconify-icon icon="lucide:x" style="width:14px;height:14px;"></iconify-icon>
                  </button>
                </div>
              </template>
              <button class="btn-add-disk" @click="addDiskToRaid(ri)" type="button">
                <iconify-icon icon="lucide:plus" style="width:12px;height:12px;"></iconify-icon> Añadir unidad a este grupo
              </button>
            </div>
          </div>
        </template>

        <button class="btn-add-raid" @click="addRaid()" type="button">
          <iconify-icon icon="lucide:hard-drive" style="width:16px;height:16px;"></iconify-icon> Añadir nuevo grupo RAID / Arreglo
        </button>
      </div>

      <!-- TAGS -->
      <div class="edit-section">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:tag" style="width:14px;height:14px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
          Tags <span style="color:#555;font-size:0.6rem;font-weight:400;">(opcional)</span>
        </h2>
        <div class="token-field-wrap" @click.outside="showTagDropdown = false">
          <div class="token-field">
            <template x-for="tid in selectedTagIds" :key="tid">
              <span class="token-pill" :style="'border-color:' + (allTags.find(t => t.id === tid)?.color || '#6c5ce7') + '60;'">
                <span class="tag-dot" :style="'background:' + (allTags.find(t => t.id === tid)?.color || '#6c5ce7') + ';'"></span>
                <span x-text="allTags.find(t => t.id === tid)?.name || '?'"></span>
                <button class="token-remove" @click="removeTag(tid)" type="button">&times;</button>
              </span>
            </template>
            <input class="token-input" type="text" x-model="tagSearch" @input="onTagInput" @keydown="onTagKeydown" @focus="onTagInput" placeholder="Buscar tags...">
          </div>
          <div class="token-dropdown" x-show="showTagDropdown && filteredTags.length > 0">
            <template x-for="tag in filteredTags" :key="tag.id">
              <button class="token-dropdown-item" type="button" @click="selectTag(tag)" :style="'--td-color:' + tag.color + ';'">
                <span class="tag-dot" :style="'background:' + tag.color + ';'"></span>
                <span x-text="tag.name"></span>
              </button>
            </template>
          </div>
        </div>
        <div x-show="allTags.length === 0" style="font-size:0.65rem;color:#555;margin-top:0.3rem;">
          No hay tags. Cr&eacute;alos desde <a href="tags.html" style="color:#6c5ce7;">tags.html</a>
        </div>
      </div>

      <!-- SERVICIOS -->
      <div class="edit-section">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:globe" style="width:14px;height:14px;color:#f39c12;flex-shrink:0;"></iconify-icon>
          Servicios
        </h2>
        <div class="field-error" x-show="errors.servicios" x-text="errors.servicios" style="margin-bottom:0.5rem;"></div>
        <template x-for="(svc, i) in form.servicios" :key="i">
          <div class="svc-edit-block">
            <div class="svc-edit-header">
              <strong style="font-size:0.75rem;color:#aaa;" x-text="'Servicio #' + (i+1)"></strong>
              <button class="btn-icon" @click="removeService(i)" title="Eliminar servicio">
                <iconify-icon icon="lucide:x" style="width:12px;height:12px;"></iconify-icon>
              </button>
            </div>
            <div class="edit-grid">
              <div class="field-group"><label>Nombre del servicio *</label><input type="text" x-model="svc.nombre" placeholder="Ej: PostgreSQL"></div>
              <div class="field-group"><label>Puerto</label><input type="text" x-model="svc.puerto" placeholder="Ej: 5432"></div>
            </div>
            <div class="edit-grid" style="margin-top:0.4rem;">
              <div class="field-group"><label>Usuario (opcional)</label><input type="text" x-model="svc.usuario" placeholder="Ej: admin_db"></div>
              <div class="field-group"><label>Contraseña (opcional)</label><input type="password" x-model="svc.password" placeholder="••••••••"></div>
            </div>
            <div class="field-group"><label>Descripci&oacute;n</label><input type="text" x-model="svc.descripcion" placeholder="Ej: Base de datos principal"></div>
            <div class="field-group">
              <label>IPs / Rangos</label>
              <template x-for="(ip, j) in svc.ips" :key="j">
                <div class="ip-row">
                  <input type="text" x-model="svc.ips[j]" placeholder="Ej: 10.0.0.1" style="font-family:monospace;font-size:0.7rem;">
                  <button class="btn-icon" @click="removeServiceIp(i, j)" title="Quitar IP">
                    <iconify-icon icon="lucide:x" style="width:11px;height:11px;"></iconify-icon>
                  </button>
                </div>
              </template>
              <button class="btn" @click="addServiceIp(i)" style="margin-top:0.3rem;padding:0.2rem 0.5rem;font-size:0.6rem;border:1px dashed var(--border-subtle);border-radius:6px;background:transparent;color:#555;cursor:pointer;">
                + Agregar IP / rango
              </button>
            </div>
          </div>
        </template>
        <button class="btn" @click="addService()" style="margin-top:0.5rem;padding:0.35rem 0.7rem;font-size:0.7rem;border:1px dashed var(--border-subtle);border-radius:8px;background:transparent;color:#6c5ce7;cursor:pointer;">
          + Agregar servicio
        </button>
      </div>

      <!-- CREDENCIALES -->
      <div class="edit-section" x-show="canEdit">
        <h2 class="det-section-title">
          <iconify-icon icon="lucide:lock" style="width:14px;height:14px;color:#e74c3c;flex-shrink:0;"></iconify-icon>
          Credenciales <span style="color:#6c5ce7;font-size:0.6rem;font-weight:400;">(admin)</span>
        </h2>
        <div class="edit-grid">
          <div class="field-group"><label>IPMI</label><input type="text" x-model="credForm.ipmi" style="font-family:monospace;font-size:0.7rem;" placeholder="Ej: 10.0.0.100"></div>
          <div class="field-group"><label>IP Servicio</label><input type="text" x-model="credForm.ip_servicio" style="font-family:monospace;font-size:0.7rem;" placeholder="Ej: 10.0.0.101"></div>
          <div class="field-group"><label>Usuario</label><input type="text" x-model="credForm.usuario" style="font-family:monospace;font-size:0.7rem;"></div>
          <div class="field-group"><label>Password</label><input type="text" x-model="credForm.password" style="font-family:monospace;font-size:0.7rem;"></div>
        </div>
      </div>
    </div>
  </template>
</div>
<script src="js/supabase.js"></script>
<script src="js/toast.js"></script>
<script src="js/audit.js"></script>
<script src="js/edit-server.js"></script>

<!-- Toast container -->
<div x-data x-show="$store.toast.items.length" class="toast-container">
  <template x-for="t in $store.toast.items" :key="t.id">
    <div class="toast" :class="t.type">
      <iconify-icon icon="lucide:check-circle" x-show="t.type==='success'" style="width:16px;height:16px;color:#2ecc71;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:alert-circle" x-show="t.type==='error'" style="width:16px;height:16px;color:#e74c3c;flex-shrink:0;"></iconify-icon>
      <iconify-icon icon="lucide:info" x-show="t.type==='info'" style="width:16px;height:16px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
      <span x-text="t.message"></span>
    </div>
  </template>
</div>
</body>
</html>
