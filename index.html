<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Inventory Control</title>

  <!-- Dependencias CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/Lucide.css">

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <!-- Estilos locales -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div x-data="app()" x-init="init()">
  <!-- ============================================================= -->
  <!-- LOGIN SCREEN -->
  <!-- Pantalla de inicio de sesión. Solo visible cuando no hay sesión -->
  <!-- ============================================================= -->
  <div class="login-screen" x-show="!user">
    <div class="login-card">
      <h1>
        <svg class="l-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
          <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
          <line x1="6" y1="6" x2="6.01" y2="6"/>
          <line x1="6" y1="18" x2="6.01" y2="18"/>
        </svg>
        BASTIONX LAB
      </h1>
      <div class="l-sub">Acceso restringido &mdash; solo @bastionx.com</div>

      <form @submit.prevent="login()">
        <div class="form-group">
          <label>Correo electr&oacute;nico</label>
          <input type="email" x-model="loginEmail" placeholder="admin@bastionx.com" required>
        </div>
        <div class="form-group">
          <label>Contrase&ntilde;a</label>
          <input type="password" x-model="loginPassword" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
        </div>
        <div class="error-msg" x-text="loginError" x-show="loginError"></div>
        <div class="success-msg" x-text="loginSuccess" x-show="loginSuccess"></div>
        <button type="submit" style="width:100%;margin-top:0.5rem;" :disabled="loading">
          <span x-text="loading ? 'Ingresando...' : 'Ingresar'"></span>
        </button>
      </form>
    </div>
  </div>

  <!-- ============================================================= -->
  <!-- MAIN APP — visible solo cuando hay sesión activa -->
  <!-- ============================================================= -->
  <template x-if="user">
    <div class="container">
      <!-- TOP BAR -->
      <div class="topbar">
        <h1>
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
            <line x1="6" y1="6" x2="6.01" y2="6"/>
            <line x1="6" y1="18" x2="6.01" y2="18"/>
          </svg>
          BASTIONX LAB
          <small>inventory control</small>
        </h1>
        <div class="user-badge" @click="logout">
          <svg class="u-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span x-text="user?.email"></span>
          <span class="role-badge" x-text="userRole"></span>
          <svg style="width:12px;height:12px;color:#333;margin-left:4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </div>
      </div>

      <!-- STATS ROW -->
      <div class="stats-row">
        <div class="stat-pill online">
          <span class="s-dot"></span>
          <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Activos <span class="s-count" x-text="countByStatus('Activo')"></span>
        </div>
        <div class="stat-pill offline">
          <span class="s-dot"></span>
          <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          Inactivos <span class="s-count" x-text="countByStatus('Inactivo')"></span>
        </div>
        <div class="stat-pill pending">
          <span class="s-dot"></span>
          <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          Pendientes <span class="s-count" x-text="countByStatus('Pendiente')"></span>
        </div>
        <div class="stat-pill free">
          <span class="s-dot"></span>
          <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
          </svg>
          Libres <span class="s-count" x-text="countByStatus('Libre')"></span>
        </div>
        <div class="stat-pill" style="color:#666;border-color:transparent;background:transparent;">
          <svg style="width:13px;height:13px;color:#444;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
          Total <span class="s-count" style="color:#aaa;" x-text="servers.length"></span>
        </div>
        <div class="stat-pill" style="color:#666;border-color:transparent;background:transparent;">
          <svg style="width:13px;height:13px;color:#444;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
            <line x1="6" y1="6" x2="6.01" y2="6"/>
            <line x1="6" y1="18" x2="6.01" y2="18"/>
          </svg>
          RAM: <span x-text="totalRam + ' GB'"></span>
        </div>
      </div>

      <!-- LOADING -->
      <div class="loading-state" x-show="loading">
        <svg style="width:18px;height:18px;color:#6c5ce7;animation:spin 1s linear infinite;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a10 10 0 0 1 10 10"/>
        </svg>
        Cargando inventario...
      </div>

      <!-- KANBAN BOARD -->
      <div class="kanban-board" x-show="!loading">

        <!-- COLUMNA: ACTIVO -->
        <div class="kanban-col col-online">
          <div class="col-header">
            <svg class="col-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            Activo
            <span class="col-count" x-text="serversByStatus('Activo').length"></span>
          </div>
          <template x-for="s in serversByStatus('Activo')" :key="s.id">
            <div class="kanban-card card-online" @click="openDetail(s)">
              <div class="card-top">
                <svg class="server-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                  <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                  <line x1="6" y1="6" x2="6.01" y2="6"/>
                  <line x1="6" y1="18" x2="6.01" y2="18"/>
                </svg>
                <h4 x-text="s.hostname"></h4>
              </div>
              <div class="card-meta">
                <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                </svg>
                <span x-text="s.ubicacion"></span>
                <span style="color:#333">&middot;</span>
                <span class="status-dot online"></span>
                <span style="color:var(--c-online)">Activo</span>
              </div>
              <div class="card-tags">
                <span class="tag" :class="cpuTagClass(s)" x-show="s.procesador && s.procesador !== ''">
                  <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                    <rect x="9" y="9" width="6" height="6"/>
                  </svg>
                  <span x-text="shortCpu(s.procesador)"></span>
                </span>
                <span class="tag ram-tag">
                  <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
                    <line x1="9" y1="2" x2="9" y2="6"/>
                    <line x1="15" y1="2" x2="15" y2="6"/>
                  </svg>
                  <span x-text="s.ram_gb + ' GB'"></span>
                </span>
                <span class="tag drive" x-show="diskCount(s) > 0">
                  <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <ellipse cx="12" cy="5" rx="9" ry="3"/>
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                  </svg>
                  <span x-text="diskCount(s) + ' drives'"></span>
                </span>
              </div>
              <div class="ram-bar" x-show="s.ram_gb > 0">
                <div class="bar-fill" :style="'width:' + ramPercent(s) + '%;background:' + ramColor(s) + ';'"></div>
              </div>
            </div>
          </template>
          <template x-if="serversByStatus('Activo').length === 0">
            <div class="empty-col">
              <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                <line x1="6" y1="6" x2="6.01" y2="6"/>
              </svg>
              Sin servidores activos
            </div>
          </template>
        </div>

        <!-- COLUMNA: INACTIVO -->
        <div class="kanban-col col-offline">
          <div class="col-header">
            <svg class="col-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            Inactivo
            <span class="col-count" x-text="serversByStatus('Inactivo').length"></span>
          </div>
          <template x-for="s in serversByStatus('Inactivo')" :key="s.id">
            <div class="kanban-card card-offline" @click="openDetail(s)">
              <div class="card-top">
                <svg class="server-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                  <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                  <line x1="6" y1="6" x2="6.01" y2="6"/>
                  <line x1="6" y1="18" x2="6.01" y2="18"/>
                </svg>
                <h4 x-text="s.hostname"></h4>
              </div>
              <div class="card-meta">
                <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                </svg>
                <span x-text="s.ubicacion"></span>
                <span style="color:#333">&middot;</span>
                <span class="status-dot offline"></span>
                <span style="color:var(--c-offline)">Inactivo</span>
              </div>
              <div class="card-tags">
                <span class="tag" :class="cpuTagClass(s)" x-show="s.procesador && s.procesador !== ''">
                  <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                    <rect x="9" y="9" width="6" height="6"/>
                  </svg>
                  <span x-text="shortCpu(s.procesador)"></span>
                </span>
                <span class="tag ram-tag">
                  <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
                    <line x1="9" y1="2" x2="9" y2="6"/>
                    <line x1="15" y1="2" x2="15" y2="6"/>
                  </svg>
                  <span x-text="s.ram_gb + ' GB'"></span>
                </span>
              </div>
            </div>
          </template>
          <template x-if="serversByStatus('Inactivo').length === 0">
            <div class="empty-col">
              <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
              </svg>
              Sin servidores inactivos
            </div>
          </template>
        </div>

        <!-- COLUMNA: PENDIENTE -->
        <div class="kanban-col col-pending">
          <div class="col-header">
            <svg class="col-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            Pendiente
            <span class="col-count" x-text="serversByStatus('Pendiente').length"></span>
          </div>
          <template x-for="s in serversByStatus('Pendiente')" :key="s.id">
            <div class="kanban-card card-pending" @click="openDetail(s)">
              <div class="card-top">
                <svg class="server-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                  <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                  <line x1="6" y1="6" x2="6.01" y2="6"/>
                  <line x1="6" y1="18" x2="6.01" y2="18"/>
                </svg>
                <h4 x-text="s.hostname"></h4>
              </div>
              <div class="card-meta">
                <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                </svg>
                <span x-text="s.ubicacion"></span>
                <span style="color:#333">&middot;</span>
                <span class="status-dot pending"></span>
                <span style="color:var(--c-pending)">Pendiente</span>
              </div>
              <div class="card-tags">
                <span class="tag pending-tag">
                  <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                    <rect x="9" y="9" width="6" height="6"/>
                  </svg>
                  Sin especificar
                </span>
              </div>
            </div>
          </template>
          <template x-if="serversByStatus('Pendiente').length === 0">
            <div class="empty-col">
              <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
              Sin servidores pendientes
            </div>
          </template>
        </div>

        <!-- COLUMNA: LIBRE -->
        <div class="kanban-col col-free">
          <div class="col-header">
            <svg class="col-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <line x1="3" y1="9" x2="21" y2="9"/>
            </svg>
            Libre
            <span class="col-count" x-text="serversByStatus('Libre').length"></span>
          </div>
          <template x-for="s in serversByStatus('Libre')" :key="s.id">
            <div class="kanban-card card-free" @click="openDetail(s)">
              <div class="card-top">
                <svg class="server-icon" style="color:#444;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                  <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                  <line x1="6" y1="6" x2="6.01" y2="6"/>
                  <line x1="6" y1="18" x2="6.01" y2="18"/>
                </svg>
                <h4 style="color:#666;" x-text="s.hostname"></h4>
              </div>
              <div class="card-meta">
                <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                </svg>
                <span x-text="s.ubicacion"></span>
                <span style="color:#333">&middot;</span>
                <span class="status-dot free"></span>
                <span style="color:#555">Libre</span>
              </div>
              <div class="card-tags">
                <span class="tag empty-tag">
                  <svg class="tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="8" y1="12" x2="16" y2="12"/>
                  </svg>
                  Disponible
                </span>
              </div>
            </div>
          </template>
          <template x-if="serversByStatus('Libre').length === 0">
            <div class="empty-col">
              <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
              </svg>
              Sin espacios libres
            </div>
          </template>
        </div>
      </div>

      <!-- ADMIN PANEL — Solo visible para usuarios con role='admin' -->
      <div class="admin-panel" x-show="userRole === 'admin' && !loading">
        <h2>
          <svg style="width:16px;height:16px;color:#6c5ce7;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          Panel de Administraci&oacute;n
        </h2>
        <div class="admin-actions">
          <button class="btn" @click="showAddServer = true">
            <svg style="width:12px;height:12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Agregar servidor
          </button>
          <a class="btn" href="https://supabase.com/dashboard/project/unaadjavtrsogkzcbmev/auth/users" target="_blank">
            <svg style="width:12px;height:12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Gestionar usuarios (Dashboard)
          </a>
          <button class="btn" @click="refreshServers()">
            <svg style="width:12px;height:12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Recargar datos
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================= -->
  <!-- MODAL: DETALLE DE SERVIDOR -->
  <!-- Muestra info completa del servidor + credenciales (si admin) -->
  <!-- ============================================================= -->
  <div class="modal-overlay" x-show="detailServer" @click.self="detailServer = null">
    <div class="modal">
      <template x-if="detailServer">
        <div>
          <h3>
            <svg style="width:16px;height:16px;color:#6c5ce7;margin-right:6px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
              <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
              <line x1="6" y1="6" x2="6.01" y2="6"/>
              <line x1="6" y1="18" x2="6.01" y2="18"/>
            </svg>
            <span x-text="detailServer.hostname"></span>
          </h3>
          <div class="detail-grid">
            <span class="label">Modelo</span>
            <span class="value" x-text="detailServer.modelo || '&mdash;'"></span>
            <span class="label">SN</span>
            <span class="value" x-text="detailServer.sn || '&mdash;'"></span>
            <span class="label">Ubicaci&oacute;n</span>
            <span class="value" x-text="detailServer.ubicacion || '&mdash;'"></span>
            <span class="label">Estado</span>
            <span class="value" x-text="detailServer.estado"></span>
            <span class="label">CPU</span>
            <span class="value" x-text="detailServer.procesador || '&mdash;'"></span>
            <span class="label">RAM</span>
            <span class="value" x-html="detailServer.ram_gb > 0 ? detailServer.ram_gb + ' GB (' + (detailServer.ram_modulos || '?') + ' m&oacute;dulos, ' + (detailServer.ram_velocidad || '?') + ')' : '&mdash;'"></span>
            <span class="label">Discos</span>
            <span class="value" x-html="diskDetail(detailServer) || '&mdash;'"></span>
            <template x-if="serverCreds">
              <>
                <span class="label">IPMI</span>
                <span class="value credential" x-text="serverCreds.ipmi || '&mdash;'"></span>
                <span class="label">IP Servicio</span>
                <span class="value credential" x-text="serverCreds.ip_servicio || '&mdash;'"></span>
                <span class="label">Usuario</span>
                <span class="value credential" x-text="serverCreds.usuario || '&mdash;'"></span>
                <span class="label">Password</span>
                <span class="value credential" x-text="serverCreds.password || '&mdash;'"></span>
              </>
            </template>
            <template x-if="!serverCreds && userRole === 'admin'">
              <span class="value" style="color:#666;">Cargando credenciales...</span>
            </template>
          </div>
          <div class="detail-actions">
            <a class="btn" :href="'https://' + serverCreds?.ipmi" target="_blank" x-show="serverCreds?.ipmi">
              <svg style="width:10px;height:10px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
              </svg>
              Abrir IPMI
            </a>
            <button class="btn danger" x-show="userRole === 'admin'" @click="deleteServer(detailServer.id)">
              <svg style="width:10px;height:10px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
              Eliminar
            </button>
            <button class="btn" @click="detailServer = null">Cerrar</button>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- ============================================================= -->
  <!-- MODAL: AGREGAR SERVIDOR -->
  <!-- Formulario para admin. Los discos se ingresan como JSON. -->
  <!-- ============================================================= -->
  <div class="modal-overlay" x-show="showAddServer" @click.self="showAddServer = false">
    <div class="modal">
      <h3>Agregar servidor</h3>
      <form @submit.prevent="addServer()">
        <div class="form-group">
          <label>Hostname *</label>
          <input type="text" x-model="newServer.hostname" required>
        </div>
        <div class="form-group">
          <label>Modelo</label>
          <input type="text" x-model="newServer.modelo">
        </div>
        <div class="form-group">
          <label>Serial Number (SN)</label>
          <input type="text" x-model="newServer.sn">
        </div>
        <div class="form-group">
          <label>Ubicaci&oacute;n (U)</label>
          <input type="text" x-model="newServer.ubicacion" placeholder="Ej: U34">
        </div>
        <div class="form-group">
          <label>Procesador</label>
          <input type="text" x-model="newServer.procesador">
        </div>
        <div class="form-group">
          <label>RAM (GB)</label>
          <input type="number" x-model="newServer.ram_gb">
        </div>
        <div class="form-group">
          <label>Estado</label>
          <select x-model="newServer.estado">
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
            <option value="Pendiente">Pendiente</option>
            <option value="Libre">Libre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Discos (JSON)</label>
          <textarea x-model="newServer.discos_str" placeholder='[{&quot;bay&quot;:&quot;Drive 0&quot;,&quot;tipo&quot;:&quot;1TB SATA&quot;}]'></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" @click="showAddServer = false">Cancelar</button>
          <button type="submit" class="btn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ============================================================= -->
  <!-- MODAL: GESTIÓN DE USUARIOS -->
  <!-- Redirige al dashboard de Supabase para crear/gestionar usuarios -->
  <!-- ============================================================= -->
  <div class="modal-overlay" x-show="showUsers" @click.self="showUsers = false">
    <div class="modal" style="max-width:500px;">
      <h3>Gestionar usuarios</h3>
      <div style="font-size:0.75rem;color:#666;margin-bottom:1rem;line-height:1.6;">
        La creaci&oacute;n y gesti&oacute;n de usuarios se realiza desde el panel de Supabase.
        Una vez creado el usuario, asigna su rol en la tabla
        <code style="font-size:0.65rem;background:#1a1a2a;padding:0.1rem 0.3rem;border-radius:3px;">user_profiles</code>.
      </div>
      <a class="btn" href="https://supabase.com/dashboard/project/unaadjavtrsogkzcbmev/auth/users" target="_blank" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.4rem 0.75rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.75rem;background:#12121a;color:#888;text-decoration:none;">
        <svg style="width:12px;height:12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Abrir Supabase Auth
      </a>
      <div style="margin-top:1rem;">
        <button class="btn" @click="showUsers = false">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<!-- Scripts locales (orden: supabase → auth → app) -->
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
