<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASTIONX LAB — Agregar servidor</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-title" content="BASTIONX LAB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#151515">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div x-data="addServerApp()" x-init="init()">
  <div class="loading-state" x-show="loading">
    <iconify-icon icon="lucide:loader" style="width:18px;height:18px;color:#6c5ce7;animation:spin 1s linear infinite;"></iconify-icon>
    Preparando formulario...
  </div>

  <template x-if="!loading">
    <div class="container" style="max-width:720px;padding:2rem 1rem;">
      <!-- TOP BAR -->
      <div class="topbar" style="margin-bottom:1.5rem;">
        <div style="display:flex;align-items:center;gap:0.75rem;">
          <button class="btn" @click="goBack()" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.35rem 0.7rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.7rem;background:#12121a;color:#888;cursor:pointer;">
            <iconify-icon icon="lucide:arrow-left" style="width:11px;height:11px;"></iconify-icon>
            Volver
          </button>
          <h1 style="font-size:1.1rem;font-weight:700;color:#fff;margin:0;">
            <iconify-icon icon="lucide:plus" style="width:18px;height:18px;color:#6c5ce7;margin-right:6px;"></iconify-icon>
            Agregar servidor
          </h1>
        </div>
      </div>

      <!-- CARD -->
      <div class="edit-form-card">

        <!-- ESSENTIAL: Hostname + SN + Modelo + Ubicación + Tags -->
        <div class="edit-section">
          <h2 class="det-section-title">
            <iconify-icon icon="lucide:server" style="width:14px;height:14px;color:#6c5ce7;flex-shrink:0;"></iconify-icon>
            Informaci&oacute;n del servidor
          </h2>
          <div class="edit-grid">
            <div class="edit-field">
              <label>Hostname *</label>
              <input type="text" x-model="form.hostname" placeholder="Ej: srv-prod-01" required>
            </div>
            <div class="edit-field">
              <label>Serial Number *</label>
              <input type="text" x-model="form.sn" placeholder="Ej: XCV1234ABCD" required>
            </div>
            <div class="edit-field">
              <label>Modelo</label>
              <input type="text" x-model="form.modelo" placeholder="Ej: PowerEdge R740">
            </div>
            <div class="edit-field">
              <label>Ubicaci&oacute;n</label>
              <input type="text" x-model="form.ubicacion" placeholder="Ej: Rack A, U12">
            </div>
          </div>
        </div>

        <!-- TAGS (token field) -->
        <div class="edit-section">
          <h2 class="det-section-title">
            <iconify-icon icon="lucide:tag" style="width:14px;height:14px;color:#2ecc71;flex-shrink:0;"></iconify-icon>
            Tags <span style="color:#555;font-size:0.6rem;font-weight:400;">(opcional)</span>
          </h2>
          <div class="token-field-wrap" @click.outside="showTagDropdown = false">
            <div class="token-field">
              <template x-for="tid in selectedTagIds" :key="tid">
                <span class="token-pill" :style="'border-color:' + (allTags.find(t => t.id === tid)?.color || '#6c5ce7') + '60;'">
                  <span class="tag-dot" :style="'background:' + (allTags.find(t => t.id === tid)?.color || '#6c5ce7') + ';'"></span>
                  <span x-text="allTags.find(t => t.id === tid)?.name || '?'"></span>
                  <button class="token-remove" @click="removeTag(tid)" type="button">&times;</button>
                </span>
              </template>
              <input class="token-input" type="text" x-model="tagSearch" @input="onTagInput" @keydown="onTagKeydown" @focus="onTagInput" placeholder="Buscar tags..." style="border:none;background:transparent;outline:none;flex:1;min-width:100px;font-size:0.75rem;color:var(--text-main);padding:2px 0;">
            </div>
            <div class="token-dropdown" x-show="showTagDropdown && filteredTags.length > 0">
              <template x-for="tag in filteredTags" :key="tag.id">
                <button class="token-dropdown-item" type="button" @click="selectTag(tag)" :style="'--td-color:' + tag.color + ';'">
                  <span class="tag-dot" :style="'background:' + tag.color + ';'"></span>
                  <span x-text="tag.name"></span>
                </button>
              </template>
            </div>
          </div>
          <div class="token-hint" x-show="allTags.length === 0" style="font-size:0.65rem;color:#555;margin-top:0.3rem;">
            No hay tags. Cr&eacute;alos desde <a href="tags.html" style="color:#6c5ce7;">tags.html</a>
          </div>
        </div>

        <!-- AVANZADO TOGGLE -->
        <button class="advanced-toggle" @click="showAdvanced = !showAdvanced" type="button">
          <iconify-icon icon="lucide:chevron-right" style="width:14px;height:14px;transition:transform 0.2s;" :style="showAdvanced ? 'transform:rotate(90deg)' : ''"></iconify-icon>
          <span x-text="showAdvanced ? 'Ocultar opciones avanzadas' : 'Mostrar opciones avanzadas'"></span>
        </button>

        <!-- ADVANCED FIELDS -->
        <div class="advanced-content" x-show="showAdvanced" x-collapse>

          <!-- PROCESADOR + RAM -->
          <div class="edit-section">
            <h2 class="det-section-title">
              <iconify-icon icon="lucide:cpu" style="width:14px;height:14px;color:#3498db;flex-shrink:0;"></iconify-icon>
              Hardware
            </h2>
            <div class="edit-grid">
              <div class="edit-field"><label>Procesador</label><input type="text" x-model="form.procesador" placeholder="Ej: Intel Xeon Silver 4314"></div>
              <div class="edit-field"><label>RAM (GB)</label><input type="number" x-model="form.ram_gb" placeholder="Ej: 64"></div>
              <div class="edit-field"><label>M&oacute;dulos RAM</label><input type="text" x-model="form.ram_modulos" placeholder="Ej: 4"></div>
              <div class="edit-field"><label>Velocidad RAM</label><input type="text" x-model="form.ram_velocidad" placeholder="Ej: 3200MHz"></div>
            </div>
          </div>

          <!-- RAIDs + DISCOS -->
          <div class="edit-section">
            <h2 class="det-section-title">
              <iconify-icon icon="lucide:hard-drive" style="width:14px;height:14px;color:#1abc9c;flex-shrink:0;"></iconify-icon>
              RAIDs y discos <span style="color:#555;font-size:0.6rem;font-weight:400;">(opcional)</span>
            </h2>
            <template x-for="(raid, ri) in form.raids" :key="ri">
              <div class="svc-edit-block">
                <div class="svc-edit-header">
                  <strong style="font-size:0.75rem;color:#aaa;" x-text="'RAID #' + (ri+1)"></strong>
                  <button class="btn-icon danger" @click="removeRaid(ri)" title="Eliminar RAID" type="button">
                    <iconify-icon icon="lucide:x" style="width:12px;height:12px;"></iconify-icon>
                  </button>
                </div>
                <div class="edit-field" style="margin-bottom:0.5rem;">
                  <label>Nombre del RAID</label>
                  <input type="text" x-model="raid.nombre" placeholder="Ej: RAID 1, RAID 5, JBOD" style="max-width:300px;">
                </div>
                <template x-for="(d, di) in raid.discos" :key="di">
                  <div style="padding:0.4rem 0;border-top:1px solid rgba(255,255,255,0.03);">
                    <div style="display:flex;align-items:center;gap:0.3rem;margin-bottom:0.3rem;">
                      <span style="font-size:0.6rem;color:#555;text-transform:uppercase;" x-text="'Disco #' + (di+1)"></span>
                      <button class="btn-icon danger" @click="removeDiskFromRaid(ri, di)" title="Eliminar disco" style="margin-left:auto;" type="button">
                        <iconify-icon icon="lucide:x" style="width:10px;height:10px;"></iconify-icon>
                      </button>
                    </div>
                    <div class="edit-grid">
                      <div class="edit-field"><label>Bah&iacute;a *</label><input type="text" x-model="d.bay" placeholder="Ej: Bay 0"></div>
                      <div class="edit-field"><label>Tipo</label><input type="text" x-model="d.tipo" placeholder="Ej: SSD, HDD"></div>
                      <div class="edit-field"><label>Tama&ntilde;o</label><input type="text" x-model="d.tamano" placeholder="Ej: 480GB, 2TB"></div>
                      <div class="edit-field"><label>Velocidad</label><input type="text" x-model="d.velocidad" placeholder="Ej: 6Gbps, SAS 12Gbps"></div>
                    </div>
                  </div>
                </template>
                <button class="btn" @click="addDiskToRaid(ri)" style="margin-top:0.4rem;padding:0.2rem 0.5rem;font-size:0.6rem;border:1px dashed var(--border-subtle);border-radius:6px;background:transparent;color:#555;cursor:pointer;" type="button">
                  + Agregar disco a este RAID
                </button>
              </div>
            </template>
            <button class="btn" @click="addRaid()" style="margin-top:0.5rem;padding:0.35rem 0.7rem;font-size:0.7rem;border:1px dashed var(--border-subtle);border-radius:8px;background:transparent;color:#6c5ce7;cursor:pointer;" type="button">
              + Agregar RAID
            </button>
          </div>

          <!-- SERVICIOS -->
          <div class="edit-section">
            <h2 class="det-section-title">
              <iconify-icon icon="lucide:globe" style="width:14px;height:14px;color:#f39c12;flex-shrink:0;"></iconify-icon>
              Servicios <span style="color:#555;font-size:0.6rem;font-weight:400;">(opcional)</span>
            </h2>
            <template x-for="(svc, i) in form.servicios" :key="i">
              <div class="svc-edit-block">
                <div class="svc-edit-header">
                  <strong style="font-size:0.75rem;color:#aaa;" x-text="'Servicio #' + (i+1)"></strong>
                  <button class="btn-icon danger" @click="removeService(i)" title="Eliminar servicio" type="button">
                    <iconify-icon icon="lucide:x" style="width:12px;height:12px;"></iconify-icon>
                  </button>
                </div>
                <div class="edit-grid">
                  <div class="edit-field"><label>Nombre del servicio *</label><input type="text" x-model="svc.nombre" placeholder="Ej: PostgreSQL"></div>
                  <div class="edit-field"><label>Puerto</label><input type="text" x-model="svc.puerto" placeholder="Ej: 5432"></div>
                </div>
                <div class="edit-field"><label>Descripci&oacute;n</label><input type="text" x-model="svc.descripcion" placeholder="Ej: Base de datos principal"></div>
                <div class="edit-field">
                  <label>IPs / Rangos</label>
                  <template x-for="(ip, j) in svc.ips" :key="j">
                    <div class="ip-row">
                      <input type="text" x-model="svc.ips[j]" placeholder="Ej: 10.0.0.1 o 10.0.0.1-10.0.0.5" style="font-family:monospace;font-size:0.7rem;">
                        <button class="btn-icon" @click="removeServiceIp(i, j)" title="Quitar IP" type="button">
                          <iconify-icon icon="lucide:x" style="width:11px;height:11px;"></iconify-icon>
                        </button>
                    </div>
                  </template>
                  <button class="btn" @click="addServiceIp(i)" style="margin-top:0.3rem;padding:0.2rem 0.5rem;font-size:0.6rem;border:1px dashed var(--border-subtle);border-radius:6px;background:transparent;color:#555;cursor:pointer;" type="button">
                    + Agregar IP / rango
                  </button>
                </div>
              </div>
            </template>
            <button class="btn" @click="addService()" style="margin-top:0.5rem;padding:0.35rem 0.7rem;font-size:0.7rem;border:1px dashed var(--border-subtle);border-radius:8px;background:transparent;color:#6c5ce7;cursor:pointer;" type="button">
              + Agregar servicio
            </button>
          </div>

        </div><!-- /advanced-content -->

        <!-- BOTTOM ACTIONS -->
        <div style="margin-top:2rem;display:flex;gap:0.5rem;justify-content:flex-end;">
          <button class="btn" @click="goBack()" style="padding:0.4rem 0.8rem;border:1px solid var(--border-subtle);border-radius:8px;font-size:0.75rem;background:#12121a;color:#888;cursor:pointer;">Cancelar</button>
          <button class="btn" @click="save()" :disabled="saving" style="padding:0.4rem 0.8rem;border:1px solid #6c5ce7;border-radius:8px;font-size:0.75rem;background:#6c5ce7;color:#fff;cursor:pointer;">
            <span x-text="saving ? 'Guardando...' : 'Guardar servidor'"></span>
          </button>
        </div>

      </div><!-- /edit-form-card -->
    </div>
  </template>
</div>
<script src="js/supabase.js"></script>
<script src="js/add-server.js"></script>
</body>
</html>
